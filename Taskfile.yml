version: '3'

vars:
  ENTRY_POINT: plantOS.yaml

tasks:
  info:
    desc: Display all available tasks and Taskfile location.
    cmds:
      - echo "Taskfile location{{":"}} $(pwd)/Taskfile.yml"
      - echo ""
      - task --list

  build:
    desc: Build plantOS.
    cmds:
      - esphome compile {{.ENTRY_POINT}}

  flash:
    desc: Flash plantOS onto MCU.
    cmds:
      - esphome upload {{.ENTRY_POINT}}

  run:
    desc: Builds, flashes and attaches to MCU log stream. Use 'task run OTA=true' for OTA flash, 'task run IDFMON=true' for esp-idf-monitor with decoded backtraces.
    cmds:
      - |
        {{if eq .OTA "true"}}
        bash -c '
          DEVICE_IP="{{.DEVICE_IP}}"
          if [ -z "$DEVICE_IP" ]; then
            echo "No DEVICE_IP provided, checking {{.ENTRY_POINT}} for static IP..."
            STATIC_IP=$(grep -A 4 "manual_ip:" {{.ENTRY_POINT}} | grep "static_ip:" | sed "s/.*static_ip: *//;s/ *#.*//;s/\"//g" | head -n 1)
            if [ -n "$STATIC_IP" ]; then
              echo "Found static IP in config: $STATIC_IP"
              DEVICE_IP="$STATIC_IP"
            else
              echo "No static IP found in config, using fallback: 192.168.0.201"
              DEVICE_IP="192.168.0.201"
            fi
          else
            echo "Using provided DEVICE_IP: $DEVICE_IP"
          fi
          echo "Attempting OTA flash to $DEVICE_IP..."
          esphome run {{.ENTRY_POINT}} --device "$DEVICE_IP"
        '
        {{else if eq .IDFMON "true"}}
        bash -c '
          echo "Building and flashing via serial/USB (IDFMON mode)..."
          devices=($(ls /dev/ttyUSB* /dev/ttyACM* 2>/dev/null))
          if [ ${#devices[@]} -eq 0 ]; then
            echo "No serial devices found. Please connect the device and try again."
            exit 1
          elif [ ${#devices[@]} -eq 1 ]; then
            device=${devices[0]}
            echo "Using device: $device"
          else
            echo "Multiple serial devices found. Please select one:"
            select device in "${devices[@]}"; do
              if [ -n "$device" ]; then
                echo "Selected: $device"
                break
              else
                echo "Invalid selection. Please try again."
              fi
            done
          fi

          # Compile first
          echo ""
          echo "=============================================="
          echo "Compiling..."
          echo "=============================================="
          esphome compile {{.ENTRY_POINT}} || exit 1

          # Upload firmware
          echo ""
          echo "=============================================="
          echo "Uploading..."
          echo "=============================================="
          esphome upload {{.ENTRY_POINT}} --device "$device" || exit 1

          # Find ELF file
          ELF_FILE=".esphome/build/plantos/.pioenvs/plantos/firmware.elf"
          if [ ! -f "$ELF_FILE" ]; then
            echo "Warning: ELF file not found at $ELF_FILE"
            echo "Backtrace decoding may not work."
            ELF_FILE=""
          fi

          # Attach with esp-idf-monitor
          echo ""
          echo "=============================================="
          echo "Attaching with esp-idf-monitor (decoded backtraces)..."
          echo "Press Ctrl+] to exit"
          echo "=============================================="
          echo ""

          # ESP32-C6 uses RISC-V toolchain (not Xtensa)
          TOOLCHAIN_PREFIX="$HOME/.platformio/packages/toolchain-riscv32-esp/bin/riscv32-esp-elf-"

          if [ -n "$ELF_FILE" ]; then
            idf-monitor --port "$device" --target esp32c6 --toolchain-prefix "$TOOLCHAIN_PREFIX" "$ELF_FILE"
          else
            idf-monitor --port "$device" --target esp32c6 --toolchain-prefix "$TOOLCHAIN_PREFIX"
          fi
        '
        {{else}}
        bash -c '
          echo "Flashing via serial/USB..."
          devices=($(ls /dev/ttyUSB* /dev/ttyACM* 2>/dev/null))
          if [ ${#devices[@]} -eq 0 ]; then
            echo "No serial devices found. Please connect the device and try again."
            exit 1
          elif [ ${#devices[@]} -eq 1 ]; then
            device=${devices[0]}
            echo "Using device: $device"
          else
            echo "Multiple serial devices found. Please select one:"
            select device in "${devices[@]}"; do
              if [ -n "$device" ]; then
                echo "Selected: $device"
                break
              else
                echo "Invalid selection. Please try again."
              fi
            done
          fi
          esphome run {{.ENTRY_POINT}} --device "$device"
        '
        {{end}}

  clean:
    desc: Clean cached files
    cmds:
      - esphome clean {{.ENTRY_POINT}}

  snoop:
    desc: Attach to device logs via serial port (USB) or OTA fallback with auto-reconnect. Use 'task snoop IDFMON=true' for esp-idf-monitor with decoded backtraces.
    cmds:
      - |
        {{if eq .IDFMON "true"}}
        bash -c '
          trap "echo \"\nExiting...\"; exit 0" INT

          # IDFMON mode - serial only (esp-idf-monitor doesnt support network)
          devices=($(ls /dev/ttyUSB* /dev/ttyACM* 2>/dev/null))

          if [ ${#devices[@]} -eq 0 ]; then
            echo "No serial devices found. IDFMON mode requires a serial connection."
            echo "Please connect the device via USB and try again."
            exit 1
          elif [ ${#devices[@]} -eq 1 ]; then
            device=${devices[0]}
            echo "Using device: $device"
          else
            echo "Multiple serial devices found. Please select one:"
            select device in "${devices[@]}"; do
              if [ -n "$device" ]; then
                echo "Selected: $device"
                break
              else
                echo "Invalid selection. Please try again."
              fi
            done
          fi

          # Find ELF file for backtrace decoding
          ELF_FILE=".esphome/build/plantos/.pioenvs/plantos/firmware.elf"
          if [ ! -f "$ELF_FILE" ]; then
            echo "Warning: ELF file not found at $ELF_FILE"
            echo "Backtrace decoding may not work. Run '\''task build'\'' first."
            ELF_FILE=""
          fi

          # ESP32-C6 uses RISC-V toolchain (not Xtensa)
          TOOLCHAIN_PREFIX="$HOME/.platformio/packages/toolchain-riscv32-esp/bin/riscv32-esp-elf-"

          # Connect with esp-idf-monitor with auto-reconnect
          while true; do
            echo ""
            echo "=============================================="
            echo "Connecting to $device with esp-idf-monitor..."
            echo "Press Ctrl+] to exit monitor, Ctrl+C to exit completely"
            echo "=============================================="
            echo ""

            if [ -n "$ELF_FILE" ]; then
              idf-monitor --port "$device" --target esp32c6 --toolchain-prefix "$TOOLCHAIN_PREFIX" "$ELF_FILE" || true
            else
              idf-monitor --port "$device" --target esp32c6 --toolchain-prefix "$TOOLCHAIN_PREFIX" || true
            fi
            echo ""
            echo "Connection lost. Retrying in 0.5 seconds..."
            sleep 0.5
          done
        '
        {{else}}
        bash -c '
          trap "echo \"\nExiting...\"; exit 0" INT

          # Try to find serial devices first
          devices=($(ls /dev/ttyUSB* /dev/ttyACM* 2>/dev/null))

          if [ ${#devices[@]} -eq 0 ]; then
            # No serial devices - fall back to OTA
            echo "No serial devices found. Falling back to OTA..."

            # Check for static IP in plantOS.yaml
            DEVICE_IP="{{.DEVICE_IP}}"
            if [ -z "$DEVICE_IP" ]; then
              echo "No DEVICE_IP provided, checking {{.ENTRY_POINT}} for static IP..."
              STATIC_IP=$(grep -A 4 "manual_ip:" {{.ENTRY_POINT}} | grep "static_ip:" | sed "s/.*static_ip: *//;s/ *#.*//;s/\"//g" | head -n 1)
              if [ -n "$STATIC_IP" ]; then
                echo "Found static IP in config: $STATIC_IP"
                DEVICE_IP="$STATIC_IP"
              else
                echo "No static IP found in config, using fallback: 192.168.0.201"
                DEVICE_IP="192.168.0.201"
              fi
            else
              echo "Using provided DEVICE_IP: $DEVICE_IP"
            fi

            # Connect via OTA with auto-reconnect
            echo ""
            echo "=============================================="
            echo "Connecting to logs via OTA at $DEVICE_IP..."
            echo "Press Ctrl+C to exit"
            echo "=============================================="
            echo ""

            while true; do
              esphome logs {{.ENTRY_POINT}} --device "$DEVICE_IP" || true
              echo ""
              echo "Connection lost. Retrying in 2 seconds..."
              sleep 2
            done

          elif [ ${#devices[@]} -eq 1 ]; then
            # Single serial device found
            device=${devices[0]}
            echo "Using device: $device"

            # Connect via serial with auto-reconnect
            while true; do
              echo ""
              echo "=============================================="
              echo "Connecting to $device..."
              echo "=============================================="
              esphome logs {{.ENTRY_POINT}} --device "$device" || true
              echo ""
              echo "Connection lost. Retrying in 0.5 seconds..."
              echo "Press Ctrl+C to exit."
              sleep 0.5
            done

          else
            # Multiple serial devices - let user select
            echo "Multiple serial devices found. Please select one:"
            select device in "${devices[@]}"; do
              if [ -n "$device" ]; then
                echo "Selected: $device"
                break
              else
                echo "Invalid selection. Please try again."
              fi
            done

            # Connect via selected serial device with auto-reconnect
            while true; do
              echo ""
              echo "=============================================="
              echo "Connecting to $device..."
              echo "=============================================="
              esphome logs {{.ENTRY_POINT}} --device "$device" || true
              echo ""
              echo "Connection lost. Retrying in 0.5 seconds..."
              echo "Press Ctrl+C to exit."
              sleep 0.5
            done
          fi
        '
        {{end}}

  push:
    desc: Push updated configuration to github.
    cmds:
      - git push -u origin main

  # status:
  #   desc: Display device's current operational status and key metrics.
  #   cmds:
  #     - echo "Querying device status..."
  #     - echo "Note: Detailed implementation depends on device API"
  #     - esphome config {{.ENTRY_POINT}} --show-secrets | grep -E "(name:|platform:|board:|framework:)" || true

  reboot:
    desc: Reboot the ESP32 device and attach to logs (requires confirmation).
    prompt: This will reboot the device. Continue?
    silent: true
    cmds:
      - |
        bash -c '
          # Try network reboot first
          DEVICE_IP="{{.DEVICE_IP}}"
          if [ -z "$DEVICE_IP" ]; then
            echo "No DEVICE_IP provided, checking {{.ENTRY_POINT}} for static IP..."
            STATIC_IP=$(grep -A 4 "manual_ip:" {{.ENTRY_POINT}} | grep "static_ip:" | sed "s/.*static_ip: *//;s/ *#.*//;s/\"//g" | head -n 1)
            if [ -n "$STATIC_IP" ]; then
              echo "Found static IP in config: $STATIC_IP"
              DEVICE_IP="$STATIC_IP"
            else
              echo "No static IP found in config, using fallback: 192.168.0.201"
              DEVICE_IP="192.168.0.201"
            fi
          else
            echo "Using provided DEVICE_IP: $DEVICE_IP"
          fi

          echo "Attempting network reboot at $DEVICE_IP..."
          # Try the restart button endpoint (ESPHome web server v2)
          if curl -X POST "http://$DEVICE_IP/button/03_01_Reboot_Device/press" --max-time 5 --silent --show-error 2>/dev/null; then
            echo "✓ Reboot command sent via network successfully"
            echo "Waiting for device to restart..."
            sleep 5
            echo ""
            echo "=============================================="
            echo "Attaching to logs at $DEVICE_IP..."
            echo "Press Ctrl+C to exit"
            echo "=============================================="
            echo ""
            esphome logs {{.ENTRY_POINT}} --device "$DEVICE_IP"
            exit 0
          else
            echo "✗ Network reboot failed"
            echo ""
            echo "Serial reboot not supported - please manually press the reset button on the device."
            echo ""

            # Fall back to serial logs
            devices=($(ls /dev/ttyUSB* /dev/ttyACM* 2>/dev/null))
            if [ ${#devices[@]} -eq 0 ]; then
              echo "✗ No serial devices found for log monitoring."
              echo "Please check network connection or connect via USB."
              exit 1
            elif [ ${#devices[@]} -eq 1 ]; then
              device=${devices[0]}
              echo "Using device: $device"
            else
              echo "Multiple serial devices found. Please select one:"
              select device in "${devices[@]}"; do
                if [ -n "$device" ]; then
                  echo "Selected: $device"
                  break
                else
                  echo "Invalid selection. Please try again."
                fi
              done
            fi

            echo ""
            echo "=============================================="
            echo "Waiting for manual reboot, then attaching to logs at $device..."
            echo "Press Ctrl+C to exit"
            echo "=============================================="
            echo ""
            esphome logs {{.ENTRY_POINT}} --device "$device"
          fi
        '

  config_validate:
    desc: Validate plantOS.yaml configuration for syntax and structural errors.
    cmds:
      - esphome config {{.ENTRY_POINT}}

  decode:
    desc: Decode crash addresses using RISC-V addr2line. Usage - task decode -- 0x420d9443 0x42018682
    cmds:
      - |
        bash -c '
          ADDR2LINE="$HOME/.platformio/packages/toolchain-riscv32-esp/bin/riscv32-esp-elf-addr2line"
          ELF_FILE=".esphome/build/plantos/.pioenvs/plantos/firmware.elf"

          if [ ! -f "$ADDR2LINE" ]; then
            echo "Error: RISC-V addr2line not found at $ADDR2LINE"
            echo "Please ensure PlatformIO toolchain is installed."
            exit 1
          fi

          if [ ! -f "$ELF_FILE" ]; then
            echo "Error: ELF file not found at $ELF_FILE"
            echo "Please run '\''task build'\'' first to generate the firmware."
            exit 1
          fi

          if [ $# -eq 0 ]; then
            echo "Usage: task decode -- <address1> [address2] [address3] ..."
            echo ""
            echo "Example: task decode -- 0x420d9443 0x42018682"
            echo ""
            echo "Addresses can be found in crash dumps (PC, RA, stack addresses)."
            exit 1
          fi

          echo "Decoding addresses with: $ADDR2LINE"
          echo "ELF file: $ELF_FILE"
          echo ""
          echo "=============================================="

          "$ADDR2LINE" -fiaC -e "$ELF_FILE" "$@"
        ' -- {{.CLI_ARGS}}
