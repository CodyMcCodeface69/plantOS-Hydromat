esphome:
  name: my-device

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf
    version: recommended

web_server:
  port: 80

logger:
  level: DEBUG

external_components:
  - source: components

light:
  - platform: esp32_rmt_led_strip
    pin: 8
    num_leds: 1
    rgb_order: RGB
    name: "Built-in LED"
    id: system_led
    chipset: WS2812
    default_transition_length: 0s

sensor:
  - platform: sensor_dummy
    id: sensor_dummy_id
    name: "My Dummy Value"
    update_interval: 1s
    on_value:
      then:
        - if:
            condition:
              sensor.in_range:
                id: sensor_dummy_id
                above: 50
            then:
              - light.turn_on:
                  id: system_led
                  brightness: 25%
                  red: 0%
                  green: 100%
                  blue: 0%
            else:
              - light.turn_off: system_led

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  - platform: esphome
