################################################################################
# Number Components: PWM Sliders for Direct GPIO Control
#
# Section 13 - PWM Control Sliders (HARDWARE TESTING ONLY)
# These sliders provide direct PWM control (0-100%) of GPIO outputs
# bypassing ALL safety and abstraction layers.
#
# WARNING: Use only for hardware testing and calibration!
# TODO: REMOVE BEFORE FINAL RELEASE
################################################################################
number:
  # === Night Mode Time Configuration ===
  - platform: template
    id: night_start_hour
    name: "01_02_Night Mode Start Hour"
    icon: "mdi:clock-start"
    optimistic: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 22
    restore_value: true
    unit_of_measurement: "h"
    mode: box
    set_action:
      - lambda: |-
          ESP_LOGI("number", "Night Mode Start Hour set to %.0f:00", x);
          id(unified_controller)->setNightModeConfig(id(night_mode_switch).state, x, id(night_end_hour).state);

  - platform: template
    id: night_end_hour
    name: "01_03_Night Mode End Hour"
    icon: "mdi:clock-end"
    optimistic: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 8
    restore_value: true
    unit_of_measurement: "h"
    mode: box
    set_action:
      - lambda: |-
          ESP_LOGI("number", "Night Mode End Hour set to %.0f:00", x);
          id(unified_controller)->setNightModeConfig(id(night_mode_switch).state, id(night_start_hour).state, x);

  # === 13 - PWM Control Sliders ===
  - platform: template
    id: pwm_gpio18_slider
    name: "13_01_GPIO18 - Water Valve PWM"
    icon: "mdi:water-percent"
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 0
    restore_value: false
    unit_of_measurement: "%"
    mode: slider
    set_action:
      - output.set_level:
          id: mag_valve_output
          level: !lambda 'return x / 100.0;'
      - logger.log:
          format: "PWM GPIO18 (Water Valve) set to %.0f%% (duty cycle: %.2f)"
          args: ['x', 'x / 100.0']

  - platform: template
    id: pwm_gpio19_slider
    name: "13_02_GPIO19 - Acid Pump PWM"
    icon: "mdi:flask-percent"
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 0
    restore_value: false
