            ESP_LOGI("button", "Please measure the volume in mL.");
            ESP_LOGI("button", "After measurement: Divide mL by 10 to get mL/s flow rate.");
            ESP_LOGI("button", "Update 'pump_grow_flow_rate_ml_s' and 'pump_grow_pwm_intensity' in plantOS.yaml.");

            // Turn on pump with PWM intensity
            id(hal)->setPump("NutrientPumpA", true, pwm_intensity);

        - delay: 10s
        - lambda: |-
            // Turn off pump
            id(hal)->setPump("NutrientPumpA", false);
            ESP_LOGI("button", "Grow Pump auto-OFF after 10s");
            ESP_LOGI("button", "===================================");

  - platform: template
    name: "12_04_Test Micro Pump (10s)"
    on_press:
      # Turn ON micro pump for 10 seconds at current PWM slider value
      # Maps to "NutrientPumpB" actuator ID
      then:
        - lambda: |-
            // Read current PWM slider value (0-100%)
            float pwm_percent = id(pwm_gpio21_slider).state;
            float pwm_intensity = pwm_percent / 100.0f;

            // Log calibration instructions
            ESP_LOGI("button", "=== Micro Pump Calibration Test ===");
            ESP_LOGI("button", "Test run started (10s) at %.0f%% PWM", pwm_percent);
            ESP_LOGI("button", "Please measure the volume in mL.");
            ESP_LOGI("button", "After measurement: Divide mL by 10 to get mL/s flow rate.");
            ESP_LOGI("button", "Update 'pump_micro_flow_rate_ml_s' and 'pump_micro_pwm_intensity' in plantOS.yaml.");

            // Turn on pump with PWM intensity
            id(hal)->setPump("NutrientPumpB", true, pwm_intensity);

        - delay: 10s
        - lambda: |-
            // Turn off pump
            id(hal)->setPump("NutrientPumpB", false);
            ESP_LOGI("button", "Micro Pump auto-OFF after 10s");
            ESP_LOGI("button", "====================================");

  - platform: template
    name: "12_05_Test Bloom Pump (10s)"
    on_press:
      # Turn ON bloom pump for 10 seconds at current PWM slider value
      # Maps to "NutrientPumpC" actuator ID
      then:
        - lambda: |-
            // Read current PWM slider value (0-100%)
            float pwm_percent = id(pwm_gpio22_slider).state;
            float pwm_intensity = pwm_percent / 100.0f;

            // Log calibration instructions
            ESP_LOGI("button", "=== Bloom Pump Calibration Test ===");
            ESP_LOGI("button", "Test run started (10s) at %.0f%% PWM", pwm_percent);
            ESP_LOGI("button", "Please measure the volume in mL.");
            ESP_LOGI("button", "After measurement: Divide mL by 10 to get mL/s flow rate.");
            ESP_LOGI("button", "Update 'pump_bloom_flow_rate_ml_s' and 'pump_bloom_pwm_intensity' in plantOS.yaml.");

            // Turn on pump with PWM intensity
            id(hal)->setPump("NutrientPumpC", true, pwm_intensity);

        - delay: 10s
        - lambda: |-
            // Turn off pump
            id(hal)->setPump("NutrientPumpC", false);
            ESP_LOGI("button", "Bloom Pump auto-OFF after 10s");
            ESP_LOGI("button", "====================================");

  # === 13 - Precision Dosing Tests (2cl/20mL) ===
  - platform: template
    name: "13_01_Test Grow Pump (2cl = 20mL)"
    on_press:
      # Test precise volume output: 2cl (20mL) from Grow Pump
      # Uses HAL pumpflow() to convert mL to seconds based on calibration
      then:
        - lambda: |-
            // Use HAL pumpflow to calculate duration for 20mL
            float target_ml = 20.0f;
            float duration_s = id(hal)->pumpflow("NutrientPumpA", target_ml);

            ESP_LOGI("button", "=== Grow Pump 2cl Test ===");
            ESP_LOGI("button", "Target: %.1f mL (2cl)", target_ml);
            ESP_LOGI("button", "Calculated duration: %.2f seconds", duration_s);
            ESP_LOGI("button", "Using configured PWM and flow rate from HAL");

            // Turn on pump using configured PWM intensity
            id(hal)->setPump("NutrientPumpA", true);

        # Wait for calculated duration (convert to milliseconds)
        - delay: !lambda "return (uint32_t)(id(hal)->pumpflow(\"NutrientPumpA\", 20.0f) * 1000);"

        - lambda: |-
            // Turn off pump
            id(hal)->setPump("NutrientPumpA", false);
            ESP_LOGI("button", "Grow Pump OFF - 2cl test complete");
            ESP_LOGI("button", "Please verify 20mL was dispensed");
            ESP_LOGI("button", "==========================");

  - platform: template
    name: "13_02_Test pH Pump (2cl = 20mL)"
    on_press:
      # Test precise volume output: 2cl (20mL) from pH Pump
      # Uses HAL pumpflow() to convert mL to seconds based on calibration
      then:
        - lambda: |-
