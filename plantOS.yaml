################################################################################
# PlantOS Hardware Configuration
#
# This file defines the complete hardware setup and component interconnections
# for the ESP32-C6 based plant monitoring system.
################################################################################

esphome:
  name: plantos
  on_boot:
    # Configure actuator safety gate max durations (in seconds) on boot
    # Each actuator has a safety timeout to prevent accidents
    priority: -100  # Run after all components are initialized
    then:
      - lambda: |-
          ESP_LOGI("esphome", "Configuring actuator safety gate max durations");
          id(actuator_safety)->setMaxDuration("WaterValve", 600);       // 10 min - water fill max
          id(actuator_safety)->setMaxDuration("AcidPump", 10);          // 10 sec - pH dosing
          id(actuator_safety)->setMaxDuration("NutrientPumpA", 10);     // 10 sec - nutrient A
          id(actuator_safety)->setMaxDuration("NutrientPumpB", 10);     // 10 sec - nutrient B
          id(actuator_safety)->setMaxDuration("NutrientPumpC", 10);     // 10 sec - nutrient C
          id(actuator_safety)->setMaxDuration("AirPump", 0);            // 0 = unlimited (24/7 operation)
          id(actuator_safety)->setMaxDuration("WastewaterPump", 1800);  // 30 min - slow pump

          // Configure air pump cycling (disabled by default for Normal mode 24/7)
          ESP_LOGI("esphome", "Configuring air pump cycling");
          id(actuator_safety)->setCyclingPeriods("AirPump", 120, 60);  // Default: 2 min ON, 1 min OFF
          id(actuator_safety)->enableCycling("AirPump", false);        // Default: Normal mode (24/7)

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    # ESP-IDF is chosen over Arduino for:
    # - Better RISC-V support on ESP32-C6 (newer chip architecture)
    # - More direct hardware access and lower-level control
    # - Better performance for real-time LED control (RMT peripheral)
    # - Official Espressif support and documentation
    type: esp-idf
    version: recommended

logger:
  # DEBUG level enables detailed component logging for development
  # This helps diagnose FSM state transitions and sensor callbacks
  # DEBUGNOLED mode: DEBUG level + light component filtered to INFO
  # This suppresses LED brightness/color change messages while keeping all other debug info
  # In production, consider INFO or WARN to reduce log noise
  level: DEBUG
  # ESP32-C6 uses built-in USB Serial/JTAG controller for logging
  # This must be explicitly configured or boot will hang
  hardware_uart: USB_SERIAL_JTAG

  # Component-specific log level overrides
  # Use web UI switches (section 11) to toggle verbose logging for these components
  logs:
    adc: NONE              # Suppress ADC component messages
    light: INFO            # DEBUGNOLED: Suppress LED brightness/color debug messages
    sensor: INFO           # Suppress sensor state updates (toggle via 11_01)
    text_sensor: INFO      # Suppress text sensor state updates (toggle via 11_02)
    ezo_ph_uart: INFO      # Suppress EZO pH UART debug logs (toggle via 11_03)
    sensor_filter: INFO    # Suppress sensor filter buffer logs (toggle via 11_04)
    dallas.temp.sensor: INFO  # Suppress Dallas temp sensor logs (toggle via 11_05)
    plantos_controller: INFO  # Suppress controller PSM check logs (toggle via 11_06)
    gpio_status: INFO      # Suppress GPIO status logs (toggle via 11_07)
    component: ERROR       # Suppress component timing warnings (toggle via 11_08)
    esp-idf: WARN          # Suppress ESP-IDF GPIO logs (toggle via 11_09)
    time: INFO             # Suppress time synchronization logs (toggle via 11_11) 

wifi:
  # Credentials stored in secrets.yaml (gitignored) for security
  # This allows OTA updates and web interface access
  ssid: !secret wifi_ssid
  password: !secret wifi_password

 # Static IP configuration for consistent web UI access
 # Uncomment if you want a fixed IP address
  # manual_ip:
  #   static_ip: 192.168.0.201
  #   gateway: 192.168.0.1
  #   subnet: 255.255.255.0
  #   dns1: 192.168.0.104

  # WiFi optimization for mesh networks (TP-Link Deco, etc.)
  # These settings improve compatibility with WiFi mesh systems
  # Mesh settings: Deactivate Fast Roaming and Beamforming, Deactiate Mesh for plantOS client, Deactivate 5 GHz band
  power_save_mode: none    # Disable power saving for better connectivity
  # fast_connect: true       # Skip channel scanning for faster connection

  # Force WiFi B/G mode by disabling 802.11n/ac features
  # This helps with mesh network compatibility and web server access
  # output_power: 8.5dB      # Lower output power for better mesh compatibility
  # enable_btm: false        # Disable 802.11v BSS Transition Management
  # enable_rrm: false        # Disable 802.11k Radio Resource Management

  # Reboot on connection failure after timeout
  # Helps recover from transient WiFi issues without manual intervention
  reboot_timeout: 2min

  # Update status logger with IP address when WiFi connects
  # Also perform online connectivity check on first connection
  on_connect:
    - lambda: |-
        auto ip = wifi::global_wifi_component->get_ip_addresses()[0].str();
        id(unified_controller)->getStatusLogger()->updateIP(ip);
        id(unified_controller)->getStatusLogger()->updateWebServerStatus(true, false);
        ESP_LOGI("wifi", "IP address: %s", ip.c_str());

    # Wait 2 seconds for network stack to fully initialize
    - delay: 2s

    # Perform online connectivity check
    - logger.log: "Performing online connectivity check (ping www.google.com)..."
    # Start timeout handler first (will be stopped if HTTP succeeds)
    - script.execute: connectivity_check_timeout
    - http_request.get:
        url: http://www.google.com/generate_204
        on_response:
          then:
            - lambda: |-
                // Note: Any successful response (even error codes) means network is working
                // Only timeouts indicate mesh network issues
                ESP_LOGI("wifi", "✓ Online connectivity check PASSED - HTTP response received");
                id(unified_controller)->getStatusLogger()->updateWebServerStatus(true, true);
            # Stop the timeout script since we got a response
            - script.stop: connectivity_check_timeout

  # ==============================================================
  # FALLBACK ACCESS POINT (AP) FOR DEBUGGING
  # IMPORTANT: If the device cannot connect to the main WiFi network,
  # it creates this temporary WiFi network. Connect to it to view
  # live logs in your browser at http://192.168.4.1
  # ==============================================================
  ap:
    ssid: "PlantOS-Fallback"
    password: "debug123"
ota:
  # ESPHome OTA allows firmware updates over WiFi without USB cable
  # Critical for deployed devices in hard-to-reach locations (e.g., greenhouse)
  - platform: esphome

web_server:
  # Provides real-time sensor data and component control via browser
  # Accessible at device IP on port 80 (standard HTTP)
  # Useful for debugging and monitoring without serial connection
  version: 2
  port: 80
  # Using local CSS/JS files from www/ directory
  # These files are served directly from the ESP32 filesystem
  css_url: "/local/www/webserver-v2.min.css"
  js_url: "/local/www/webserver-v2.min.js"
  local: true  # Embed all JS/CSS locally for offline operation

################################################################################
# API Services
#
# ESPHome API allows external systems (Home Assistant, custom scripts, etc.)
# to call services on the device. Temporarily disabled calibration services
# due to ESPHome variable parsing issue - will enable in a future update.
# For now, calibration can be done via direct I2C commands or custom code.
################################################################################
api:

################################################################################
# HTTP Request Component - For Online Connectivity Check
#
# Used to verify internet connectivity by attempting to fetch a known URL.
# Google's connectivity check endpoint returns HTTP 204 (No Content) when
# online, which is a lightweight test that doesn't consume bandwidth.
################################################################################
http_request:
  id: http_client
  useragent: esphome/plantOS
  timeout: 5s
  verify_ssl: false  # Skip SSL verification for simple connectivity test

################################################################################
# Time Synchronization: NTP
#
# Synchronizes the ESP32's system time with Network Time Protocol (NTP) servers.
# This enables accurate timestamping for logs, sensor data, and scheduled actions.
################################################################################
time:
  # === TIME DUMMY (for testing calendar function) ===
  # Provides configurable dummy time instead of real NTP synchronization
  # Allows manual time control via buttons for testing grow day calculations
  - platform: time_dummy
    id: sntp_time  # Keep same ID for compatibility with controller
    initial_time: "2025-12-30 08:00:00"  # Starting time (YYYY-MM-DD HH:MM:SS)
    update_interval: 1s

  # === SNTP TIME (production - currently disabled) ===
  # Uncomment below to use real NTP time synchronization
  # - platform: sntp
  #   id: sntp_time
  #   servers:
  #     - 0.pool.ntp.org
  #     - 1.pool.ntp.org
  #     - 2.pool.ntp.org
  #   timezone: "CET-1CEST,M3.5.0,M10.5.0/3"
  #   update_interval: 15min
  #   on_time_sync:
  #     then:
  #       - logger.log: "System time synchronized with NTP server"

external_components:
  # Points to local custom components directory
  # ESPHome will compile and link C++ code from here alongside generated code
  - source: components
    components: [sensor_dummy, sensor_filter, ezo_ph_uart,
                 actuator_safety_gate, calendar_manager, persistent_state_manager,
                 i2c_scanner, time_logger, time_dummy, wdt_manager, i2c_mutex_demo, plantos_hal,
                 plantos_controller]

  # ESP32-C6 ADC Fix: Use lboue's working implementation with adc_oneshot API
  # Official ESPHome ADC has bugs on C6 (no ADC2 support causes compilation errors)
  # This fork fixes the issue and works on GPIO0 (ADC1_CH0)
  # Source: https://github.com/esphome/issues/issues/6038#issuecomment-2287359862
  # To Do: Switch to github://PhracturedBlue/c6_adc to allow multiple GPIO ADC pins (for TDS meter, Light sensor, etc.)
  - source:
      type: git
      url: https://github.com/lboue/esphome
      ref: adc_oneshot
    components: [ adc ]
    refresh: 0s

################################################################################
# I²C Bus Configuration
#
# Configures the I²C bus for communication with external sensors and peripherals.
# I²C (Inter-Integrated Circuit) is a multi-master, multi-slave serial communication
# protocol commonly used for sensor integration.
#
# ESP32-C6 I²C Pins:
# - SDA (Serial Data): GPIO6 (default) - bidirectional data line
# - SCL (Serial Clock): GPIO7 (default) - clock signal line
#
# IMPORTANT: I²C requires external pull-up resistors on SDA and SCL lines
# - Typical values: 4.7kΩ to 10kΩ (4.7kΩ recommended for most applications)
# - Pull-ups connect SDA/SCL to 3.3V
# - Without pull-ups, I²C communication will fail
#
# Bus Speed:
# - 100kHz: Standard mode (default, most compatible)
# - 400kHz: Fast mode (higher speed, may require lower pull-up resistance)
################################################################################
i2c:
  id: i2c_bus
  sda: GPIO6  # Serial Data Line (change if using different pins)
  scl: GPIO7  # Serial Clock Line (change if using different pins)
  scan: false  # Disable ESPHome's automatic scan (we use our custom scanner)
  frequency: 100kHz  # Standard mode - change to 400kHz for fast mode if needed

################################################################################
# UART Configuration
#
# Serial communication for EZO pH sensor via UART.
# The EZO Carrier pH Click board uses UART protocol with ASCII commands.
#
# Hardware Configuration:
# - TX (Transmit): GPIO4 - Connects to RX on EZO carrier board
# - RX (Receive): GPIO5 - Connects to TX on EZO carrier board
# - Baud Rate: 115200 (default for EZO carrier boards)
# - Protocol: 8N1 (8 data bits, no parity, 1 stop bit)
#
# IMPORTANT: Ensure proper voltage levels (3.3V logic)
################################################################################
uart:
  id: uart_bus
  tx_pin: GPIO4  # ESP32-C6 TX -> EZO RX
  rx_pin: GPIO5  # ESP32-C6 RX -> EZO TX
  baud_rate: 9600  # Standard baud rate for EZO carrier boards
  data_bits: 8
  parity: NONE
  stop_bits: 1

################################################################################
# I²C Bus Scanner
#
# Scans the I²C bus for connected devices and validates critical device presence.
# This component provides comprehensive diagnostic information during boot and
# optionally during runtime.
#
# FEATURES:
# - Scans all valid 7-bit I²C addresses (0x01 to 0x77)
# - Identifies connected devices by address
# - Validates critical device presence for PlantOS operation
# - Detailed logging with warnings for missing critical devices
#
# SCAN MODES:
# - Boot-time scan: Runs once during setup (scan_on_boot: true)
# - Periodic scan: Runs at interval (scan_interval: >0)
# - Disabled: Set scan_on_boot: false and scan_interval: 0s
#
# CRITICAL DEVICES:
# Define the I²C devices required for your PlantOS configuration.
# Common PlantOS devices:
# - 0x48: ADS1115 (16-bit ADC for analog sensors)
# - 0x20: MCP23017 (16-bit GPIO expander)
# - 0x76: BME280 (temperature/humidity/pressure sensor)
# - 0x68: DS3231 (RTC for timekeeping)
################################################################################
i2c_scanner:
  id: my_i2c_scanner
  i2c_id: i2c_bus

  # Scan once at boot to validate hardware setup
  scan_on_boot: true

  # Periodic scanning (0s = disabled, only boot-time scan)
  # Set to 30s, 60s, etc. to detect hot-plug events or hardware failures
  scan_interval: 5s

  # Verbose mode: Enable detailed I²C scan logging to serial
  # true (default): Log detailed scan results every scan_interval
  # false: Silent mode - only report to central status logger
  verbose: false

  # Link to central status logger for system status reports
  status_logger: unified_controller

  # Define critical devices for your PlantOS system
  # Uncomment and modify based on your hardware configuration
  critical_devices: 
    - address: 0x61
      name: "EZO pH Sensor"
    # Add other critical devices as needed
    # - address: 0x48
    #   name: "ADS1115 ADC"
    # - address: 0x20
    #   name: "MCP23017 GPIO Expander"
    # - address: 0x76
    #   name: "BME280 Sensor"
    # - address: 0x68
    #   name: "DS3231 RTC"

################################################################################
# Visual Feedback: WS2812 RGB LED
#
# The built-in LED serves as the primary user interface, displaying system
# state via color and animation patterns controlled by the FSM.
################################################################################
light:
  - platform: esp32_rmt_led_strip
    # ESP32-C6-DevKitC-1 has a WS2812 RGB LED hard-wired to GPIO 8
    pin: 8
    num_leds: 1
    rgb_order: RGB
    name: "Built-in LED"
    id: system_led
    chipset: WS2812

    # default_transition_length: 0s disables automatic color smoothing
    # WHY: The FSM controller implements its own timing and animations
    # (breathing effect, blinking). ESPHome's built-in transitions would
    # interfere with precise FSM-driven visual feedback, creating lag or
    # blending between states. Instant transitions give the controller
    # full control over every frame.
    default_transition_length: 0s

################################################################################
# PWM Outputs: Actuator Control via Logic Level MOSFETs
#
# Five actuators controlled by 3.3V logic level MOSFETs with PWM support:
# - GPIO18: Magnetic Valve (fresh water inlet)
# - GPIO19: pH Pump (acid dosing for pH down)
# - GPIO20: Grow Pump (grow phase nutrients)       → HAL: NutrientPumpA → Calendar: nutrient_A_ml_per_liter
# - GPIO21: Micro Pump (micronutrients)            → HAL: NutrientPumpB → Calendar: nutrient_B_ml_per_liter
# - GPIO22: Bloom Pump (bloom phase nutrients)     → HAL: NutrientPumpC → Calendar: nutrient_C_ml_per_liter
#
# Using LEDC (LED PWM Controller) for both on/off and PWM control
# Frequency: 1000 Hz (1 kHz) - suitable for most pumps and valves
# All outputs are active HIGH (3.3V = ON/OPEN, 0V = OFF/CLOSED)
################################################################################
output:
  - platform: ledc
    id: mag_valve_output
    pin: GPIO18
    frequency: 1000 Hz
    zero_means_zero: true  # 0% duty cycle = truly off

  - platform: ledc
    id: pump_ph_output
    pin: GPIO19
    frequency: 1000 Hz
    zero_means_zero: true

  - platform: ledc
    id: pump_grow_output
    pin: GPIO20
    frequency: 1000 Hz
    zero_means_zero: true

  - platform: ledc
    id: pump_micro_output
    pin: GPIO21
    frequency: 1000 Hz
    zero_means_zero: true

  - platform: ledc
    id: pump_bloom_output
    pin: GPIO22
    frequency: 1000 Hz
    zero_means_zero: true

  # NOTE: Wastewater pump now controlled via Shelly Plus 4PM Socket 2 (HTTP control)
  # GPIO-based control removed to free GPIO23 for DS18B20 temperature sensor
  # - platform: ledc
  #   id: pump_wastewater_output
  #   pin: GPIO23
  #   frequency: 1000 Hz
  #   zero_means_zero: true

################################################################################
# 1-Wire Bus: For DS18B20 Temperature Sensor
#
# DS18B20 is a digital temperature sensor that uses the 1-Wire protocol.
# Only requires a single data line plus ground (can parasitic power from data).
# Requires 4.7kΩ pull-up resistor between data line and 3.3V.
#
# NOTE: Relocated to GPIO23 (GPIO16 is UART TX, caused 1-Wire timing conflicts).
# Wastewater pump now controlled via Shelly Plus 4PM Socket 2 (HTTP control).
# AirPump actuator now controlled via Shelly Plus 4PM Socket 0 (HTTP control).
################################################################################
one_wire:
  - platform: gpio
    pin: GPIO23
    id: one_wire_bus

################################################################################
# Sensor Input: Dummy Sensor
#
# Development/testing sensor that generates predictable cycling values.
# In production, replace with actual plant sensors (moisture, light, etc.)
################################################################################
sensor:
  # - id: sensor_dummy_id
  #   platform: sensor_dummy
  #   name: "Dummy Sensor"

  #   # 1 second polling interval provides frequent updates for responsive
  #   # controller behavior without overwhelming the ESP32 event loop.
  #   # Real sensors might use different intervals based on measurement
  #   # characteristics (e.g., soil moisture changes slowly, could poll every 60s)
  #   update_interval: 1s

  # Light Intensity Sensor: KY-046 Analog Light Sensor
  #
  # Keyes KY-046 light sensor module connected to GPIO0 (ADC1_CH0)
  # Outputs analog voltage proportional to light intensity
  #
  # HARDWARE: Wire KY-046 signal pin to GPIO0 (ADC1_CH0)
  # NOTE: GPIO0 is a boot pin - keep it floating or HIGH during boot
  #       The analog sensor output should not interfere with boot
  #
  # ESP32-C6 ADC Fix: Using lboue's fork with adc_oneshot API
  # Official ESPHome has bugs with ESP32-C6 ADC (no ADC2 support)
  # This fork currently works on GPIO0 only
  # - platform: adc
  #   id: light_intensity_raw
  #   name: "Light Intensity Raw"
  #   pin: GPIO0              # ADC1_CH0 (currently only supported pin in fork)
  #   update_interval: 5s     # Read light level every 5 seconds
  #   accuracy_decimals: 2
  #   # Note: attenuation parameter not supported in lboue's fork
  #   # The fork may use a fixed attenuation (likely 11/12dB for 0-3.3V range)
  #   filters:
  #     # Convert raw voltage to percentage (0-100%)
  #     # Multiply by 100/3.3 to convert voltage to percentage
  #     - multiply: 30.30303    # 100/3.3 = 30.30303
  #     - lambda: |-
  #         // Clamp to 0-100% range
  #         if (x < 0.0) return 0.0f;
  #         if (x > 100.0) return 100.0f;
  #         return x;

  # Temperature Sensor: DS18B20 Digital Temperature Sensor
  #
  # DS18B20 is a 1-Wire digital temperature sensor providing accurate readings
  # from -55°C to +125°C with ±0.5°C accuracy between -10°C and +85°C.
  # Connected to GPIO23 via one_wire bus.
  #
  # HARDWARE: Requires 4.7kΩ pull-up resistor between data line (GPIO23) and 3.3V
  # WIRING:
  #   - Red wire (VCC) -> 3.3V
  #   - Black wire (GND) -> GND
  #   - Yellow wire (DATA) -> GPIO23 (with 4.7kΩ pull-up to 3.3V)
  - platform: dallas_temp
    one_wire_id: one_wire_bus
    id: water_temperature
    name: "Water Temperature - DS18B20"
    update_interval: 6s     # Update temperature every 6 seconds (offset from EZO pH 10s interval)
    accuracy_decimals: 2     # Display 2 decimal places (e.g., 24.50°C)
    resolution: 12           # 12-bit resolution (0.0625°C per bit, ~750ms conversion)

  # Sensor Filter: Robust Averaging with Outlier Rejection
  #
  # Filters the raw sensor data using robust averaging to reject outliers.
  # This improves data quality by removing sensor spikes, noise, and glitches.
  - id: sensor_filtered_id
    platform: sensor_filter
    name: "00_05a_Filtered Sensor pH"
    accuracy_decimals: 3  # Display 3 decimal places (e.g., 2.936)

    # sensor_source: The raw sensor to filter
    sensor_source: ph_sensor_real

    # window_size: Number of readings to collect before calculating average
    # 5 readings = faster first result (5 minutes with 60s update interval)
    # Note: EZO pH sensor already has sliding_window_moving_average filter
    window_size: 5

    # reject_percentage: Percentage to reject from each end (0.0 to 0.5)
    # 0.10 = reject 10% lowest + 10% highest = 20% total outlier rejection
    # With 5 readings: rejects 0.5 from each end (rounds to nearest)
    reject_percentage: 0.10


################################################################################
# Binary Sensors: Water Level Sensors (XKC-Y23-V)
#
# Two capacitive non-contact water level sensors for tank fill monitoring
# - HIGH sensor (GPIO10): Tank full indicator
# - LOW sensor (GPIO11): Tank minimum level indicator
#
# Sensor Logic:
# - Both ON: Tank FULL (water above HIGH level)
# - Only LOW ON: Tank NORMAL (water between HIGH and LOW)
# - Both OFF: Tank LOW (water below LOW level)
# - HIGH ON, LOW OFF: ERROR (invalid state - check wiring)
################################################################################
binary_sensor:
  # XKC-Y23-V Water Level HIGH Sensor (GPIO10)
  # Triggers when water reaches high level (tank near full)
  - platform: gpio
    id: water_level_high_sensor
    name: "00_07_Water Level HIGH"
    pin:
      number: GPIO10
      mode:
        input: true
        pulldown: true  # Pull down when sensor not active
    filters:
      # Debounce: sensor must be stable for 500ms to prevent water ripple false triggers
      - delayed_on: 500ms
      - delayed_off: 500ms
    on_press:
      then:
        - logger.log: "Water level HIGH detected - tank near full"
    on_release:
      then:
        - logger.log: "Water level HIGH cleared - tank below high level"

  # XKC-Y23-V Water Level LOW Sensor (GPIO11)
  # Triggers when water reaches minimum safe level
  - platform: gpio
    id: water_level_low_sensor
    name: "00_08_Water Level LOW"
    pin:
      number: GPIO11
      mode:
        input: true
        pulldown: true  # Pull down when sensor not active
    filters:
      # Debounce: sensor must be stable for 500ms to prevent water ripple false triggers
      - delayed_on: 500ms
      - delayed_off: 500ms
    on_press:
      then:
        - logger.log: "Water level LOW detected - tank above minimum"
    on_release:
      then:
        - logger.log: "Water level LOW cleared - tank below minimum level"


################################################################################
# Text Sensor: Controller State (00 - Kern-Status)
#
# Publishes the current unified controller FSM state to the web UI.
# Shows state names: INIT, IDLE, SHUTDOWN, PAUSE, ERROR, PH_MEASURING,
#                    PH_CALCULATING, PH_INJECTING, PH_MIXING, PH_CALIBRATING,
#                    FEEDING, WATER_FILLING, WATER_EMPTYING
################################################################################
text_sensor:
  - platform: template
    name: "00_01_Controller State"
    id: controller_state_text
    # Lambda returns current controller state as string
    lambda: |-
      return id(unified_controller)->getStateAsString();
    # Update every 500ms to show real-time state changes
    update_interval: 500ms

  # - platform: template
  #   name: "Light Intensity"
  #   id: light_intensity_text
  #   # Lambda returns current light intensity value from HAL
  #   lambda: |-
  #     if (id(hal)->hasLightIntensity()) {
  #       char buf[32];
  #       snprintf(buf, sizeof(buf), "%.1f%%", id(hal)->readLightIntensity());
  #       return {buf};
  #     } else {
  #       return {"N/A"};
  #     }
  #   # Update every 5 seconds to match sensor update interval
  #   update_interval: 5s

  - platform: template
    name: "00_04_Water Temperature - HAL"
    id: water_temperature_text
    # Lambda returns current water temperature value from HAL
    lambda: |-
      if (id(hal)->hasTemperature()) {
        char buf[32];
        snprintf(buf, sizeof(buf), "%.1f°C", id(hal)->readTemperature());
        return {buf};
      } else {
        return {"N/A"};
      }
    # Update every 10 seconds to match sensor update interval
    update_interval: 10s

  - platform: template
    name: "00_06_Tank Volume"
    id: tank_volume_text
    # Lambda returns configured tank volume from HAL
    lambda: |-
      char buf[64];
      float volume_liters = id(hal)->getTankVolume();
      snprintf(buf, sizeof(buf), "%.1f L (LOW to HIGH)", volume_liters);
      return {buf};
    # Update every 30 seconds (static configuration value)
    update_interval: 30s

  - platform: template
    name: "00_02_Current Time (Dummy)"
    id: current_time_text
    # Lambda returns current dummy time in readable format
    lambda: |-
      auto time = id(sntp_time)->now();
      if (time.is_valid()) {
        char buf[64];
        snprintf(buf, sizeof(buf), "%04d-%02d-%02d %02d:%02d:%02d",
                 time.year, time.month, time.day_of_month,
                 time.hour, time.minute, time.second);
        return {buf};
      } else {
        return {"Not initialized"};
      }
    # Update every 1 second to show real-time clock
    update_interval: 1s

  - platform: template
    name: "00_03_Current CalMan Grow Day"
    id: current_grow_day_text
    # Lambda returns current grow day from calendar manager
    lambda: |-
      uint8_t day = id(plant_calendar)->get_current_day();
      char buf[32];
      snprintf(buf, sizeof(buf), "Day %d / 120", day);
      return {buf};
    # Update every 10 seconds
    update_interval: 10s

################################################################################
# Button: Controller Management and Manual Routines
#
# Provides manual control over the system controller and PlantOS routines.
################################################################################
button:
  # === 03 - System Control & Restart ===
  - platform: restart
    name: "03_01_Reboot Device"
    id: restart_button

  - platform: template
    name: "04_04_Set to INIT"
    on_press:
      # Lambda action calls the unified controller's resetToInit() method
      # This triggers an immediate transition to INIT state (clears errors, resets FSM)
      then:
        - lambda: |-
            ESP_LOGI("button", "Reset Controller button pressed");
            id(unified_controller)->resetToInit();

  - platform: template
    name: "03_02_Reconnect WiFi"
    on_press:
      # Force WiFi to disconnect and reconnect
      # Useful for troubleshooting mesh network connectivity issues
      then:
        - logger.log: "Forcing WiFi reconnection..."
        - wifi.disable:
        - delay: 2s
        - wifi.enable:
        - logger.log: "WiFi reconnection initiated"

  # === 04 - System State Control ===
  - platform: template
    name: "04_01_Set to SHUTDOWN (All Actuators OFF, Cal OFF)"
    on_press:
      # Transition to SHUTDOWN state
      # - Turns off all actuators
      # - Disables calendar and time-based events
      # - Persists across power cycles
      # - Only "Set to IDLE" can exit this state
      then:
        - lambda: |-
            ESP_LOGI("button", "Set to SHUTDOWN button pressed");
            id(unified_controller)->setToShutdown();

  - platform: template
    name: "04_02_Set to PAUSE (Actuators ON, Cal OFF)"
    on_press:
      # Transition to PAUSE state
      # - Maintains actuator states
      # - Disables calendar and time-based events
      # - Persists across power cycles
      # - Only "Set to IDLE" can exit this state
      then:
        - lambda: |-
            ESP_LOGI("button", "Set to PAUSE button pressed");
            id(unified_controller)->setToPause();

  - platform: template
    name: "04_03_Set to IDLE"
    on_press:
      # Transition to IDLE state
      # - Only way to exit SHUTDOWN or PAUSE states
      # - Clears state persistence from NVS
      # - Re-enables calendar and time-based events
      then:
        - lambda: |-
            ESP_LOGI("button", "Set to IDLE button pressed");
            id(unified_controller)->setToIdle();

  # === 05 - Logging & Cleanup ===
  - platform: template
    name: "05_01_Clear PSM Alerts"
    on_press:
      # Lambda action calls the PSM's clearEvent() method
      # This clears any critical events logged to NVS
      then:
        - lambda: |-
            id(psm)->clearEvent();

  # === 06 - Time Control (Dummy Time for Testing) ===
  - platform: template
    name: "06_01_Time +1 Day"
    on_press:
      # Increase dummy time by 1 day (86400 seconds)
      # Used to test calendar function and grow day calculations
      then:
        - lambda: |-
            ESP_LOGI("button", "Time +1 Day button pressed");
            id(sntp_time)->add_days(1);

  - platform: template
    name: "06_02_Time -1 Day"
    on_press:
      # Decrease dummy time by 1 day (86400 seconds)
      # Used to test calendar function and grow day calculations
      then:
        - lambda: |-
            ESP_LOGI("button", "Time -1 Day button pressed");
            id(sntp_time)->add_days(-1);

  - platform: template
    name: "06_03_Time +1 Hour"
    on_press:
      # Increase dummy time by 1 hour (3600 seconds)
      # Used to test time-based events and scheduling
      then:
        - lambda: |-
            ESP_LOGI("button", "Time +1 Hour button pressed");
            id(sntp_time)->add_hours(1);

  - platform: template
    name: "06_04_Time -1 Hour"
    on_press:
      # Decrease dummy time by 1 hour (3600 seconds)
      # Used to test time-based events and scheduling
      then:
        - lambda: |-
            ESP_LOGI("button", "Time -1 Hour button pressed");
            id(sntp_time)->add_hours(-1);

  - platform: template
    name: "06_05_Time +1 Minute"
    on_press:
      # Increase dummy time by 1 minute (60 seconds)
      # Used to test time-based events and scheduling
      then:
        - lambda: |-
            ESP_LOGI("button", "Time +1 Minute button pressed");
            id(sntp_time)->add_minutes(1);

  - platform: template
    name: "06_06_Time -1 Minute"
    on_press:
      # Decrease dummy time by 1 minute (60 seconds)
      # Used to test time-based events and scheduling
      then:
        - lambda: |-
            ESP_LOGI("button", "Time -1 Minute button pressed");
            id(sntp_time)->add_minutes(-1);

  - platform: template
    name: "06_07_Time +1 Second"
    on_press:
      # Increase dummy time by 1 second
      # Used to test precise time-based events and scheduling
      then:
        - lambda: |-
            ESP_LOGI("button", "Time +1 Second button pressed");
            id(sntp_time)->add_seconds(1);

  - platform: template
    name: "06_08_Time -1 Second"
    on_press:
      # Decrease dummy time by 1 second
      # Used to test precise time-based events and scheduling
      then:
        - lambda: |-
            ESP_LOGI("button", "Time -1 Second button pressed");
            id(sntp_time)->add_seconds(-1);

  # === 07 - pH & Measurement ===
  - platform: template
    name: "07_01_Start pH Calibration"
    on_press:
      # Start 3-point pH calibration sequence
      # Calibration points: 4.00 (low), 7.00 (mid), 10.01 (high)
      # Follow serial log prompts to insert probe into each buffer solution
      then:
        - lambda: |-
            ESP_LOGI("button", "Start pH Calibration button pressed");
            id(unified_controller)->startPhCalibration();

  - platform: template
    name: "07_02_Start pH Correction"
    on_press:
      # Start the full pH correction sequence
      # Includes measurement, calculation, dosing, and mixing
      then:
        - lambda: |-
            id(unified_controller)->startPhCorrection();

  # === 07 - pH Temperature Compensation ===
  - platform: template
    name: "07_07_Temperature Compensation (Auto)"
    on_press:
      # Read current water temperature and send to EZO pH sensor
      # This ensures pH readings are compensated for current temperature
      then:
        - logger.log: "Reading current water temperature for pH compensation"
        - lambda: |-
            if (id(hal)->hasTemperature()) {
              float temp = id(hal)->readTemperature();
              ESP_LOGI("button", "Sending temperature compensation: %.1f°C", temp);
              if (id(hal)->sendPhTemperatureCompensation(temp)) {
                ESP_LOGI("button", "Temperature compensation successful");
              } else {
                ESP_LOGE("button", "Temperature compensation failed");
              }
            } else {
              ESP_LOGE("button", "Temperature sensor not available");
            }

  - platform: template
    name: "07_08_Temperature Compensation (Manual)"
    on_press:
      # Manual temperature compensation for testing or when temp sensor fails
      # Default: 19.5°C (typical hydroponic solution temperature)
      then:
        - logger.log: "Sending manual temperature compensation (19.5°C)"
        - lambda: |-
            float manual_temp = 19.5;  // Default temperature
            ESP_LOGI("button", "Sending manual temperature compensation: %.1f°C", manual_temp);
            if (id(hal)->sendPhTemperatureCompensation(manual_temp)) {
              ESP_LOGI("button", "Manual temperature compensation successful");
            } else {
              ESP_LOGE("button", "Manual temperature compensation failed");
            }

  # === 07_09 - Check pH Calibration Status ===
  - platform: template
    name: "07_09_Check pH Calibration Status"
    on_press:
      # Query EZO pH sensor calibration status
      # Returns number of calibration points: 0, 1, 2, or 3
      # 3 points = fully calibrated (mid, low, high)
      then:
        - logger.log: "Querying EZO pH calibration status (Cal,?)"
        - lambda: |-
            id(ezo_ph_uart_component)->query_calibration_status();

  # === 08 - Primary Routines (Feeding) ===
  - platform: template
    name: "08_01_Start Feeding"
    on_press:
      # Start nutrient feeding sequence
      # Uses dosing durations from current day's schedule
      then:
        - lambda: |-
            id(unified_controller)->startFeeding();

  # === 09 - Water Management ===
  - platform: template
    name: "09_01_Fill Tank (→ pH check)"
    on_press:
      # Start tank filling sequence with auto pH correction
      # Opens water valve → Fill tank → pH correction
      then:
        - lambda: |-
            ESP_LOGI("button", "Fill tank requested (will auto-check pH after)");
            id(unified_controller)->startFillTank();

  - platform: template
    name: "09_02_Empty Tank"
    on_press:
      # Start tank emptying sequence using wastewater pump (Shelly Socket 2)
      then:
        - lambda: |-
            id(unified_controller)->startEmptyTank();

  - platform: template
    name: "09_03_Feed (Fill+Nutrients+pH)"
    on_press:
      # Start complete feeding operation
      # Fill tank → Add nutrients → pH correction
      then:
        - lambda: |-
            ESP_LOGI("button", "========================================");
            ESP_LOGI("button", "FEED OPERATION REQUESTED");
            ESP_LOGI("button", "Sequence: Fill → Nutrients → pH correction");
            ESP_LOGI("button", "========================================");
            id(unified_controller)->startFeed();

  - platform: template
    name: "09_04_Reservoir Change (Complete)"
    on_press:
      # Start complete reservoir change sequence
      # Manual empty → Fill → Nutrients → pH correction
      then:
        - lambda: |-
            ESP_LOGI("button", "========================================");
            ESP_LOGI("button", "RESERVOIR CHANGE REQUESTED");
            ESP_LOGI("button", "========================================");
            id(unified_controller)->startReservoirChange();

  # === 10 - Actuator Testing (3-Second Auto-Off) ===
  - platform: template
    name: "10_01_Test Magnetic Valve (3s)"
    on_press:
      # Turn ON magnetic valve for 3 seconds, then auto turn OFF
      # Maps to "WaterValve" actuator ID
      then:
        - lambda: |-
            ESP_LOGI("button", "Testing Magnetic Valve for 3 seconds");
            if (id(actuator_safety)->executeCommand("WaterValve", true, 10)) {
              ESP_LOGI("button", "Magnetic Valve ON - will auto turn OFF after 3s");
            } else {
              ESP_LOGW("button", "Magnetic Valve test command rejected");
            }
        - delay: 3s
        - lambda: |-
            if (id(actuator_safety)->executeCommand("WaterValve", false)) {
              ESP_LOGI("button", "Magnetic Valve auto-OFF after 3s");
            }

  - platform: template
    name: "10_02_Test pH Pump (10s)"
    on_press:
      # Turn ON pH pump for 10 seconds at current PWM slider value
      # Maps to "AcidPump" actuator ID
      then:
        - lambda: |-
            // Read current PWM slider value (0-100%)
            float pwm_percent = id(pwm_gpio19_slider).state;
            float pwm_intensity = pwm_percent / 100.0f;

            // Log calibration instructions
            ESP_LOGI("button", "=== pH Pump Calibration Test ===");
            ESP_LOGI("button", "Test run started (10s) at %.0f%% PWM", pwm_percent);
            ESP_LOGI("button", "Please measure the volume in mL.");
            ESP_LOGI("button", "After measurement: Divide mL by 10 to get mL/s flow rate.");
            ESP_LOGI("button", "Update 'pump_ph_flow_rate_ml_s' and 'pump_ph_pwm_intensity' in plantOS.yaml.");

            // Turn on pump with PWM intensity
            id(hal)->setPump("AcidPump", true, pwm_intensity);

        - delay: 10s
        - lambda: |-
            // Turn off pump
            id(hal)->setPump("AcidPump", false);
            ESP_LOGI("button", "pH Pump auto-OFF after 10s");
            ESP_LOGI("button", "================================");

