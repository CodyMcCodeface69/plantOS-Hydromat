  ################################################################################
  # === 12 - DIRECT GPIO CONTROL (HARDWARE TESTING ONLY) ===
  #
  # WARNING: These switches bypass ALL safety and abstraction layers!
  # - NO SafetyGate validation
  # - NO HAL abstraction
  # - NO debouncing or duration limits
  # - Direct GPIO output control via output.turn_on/turn_off
  #
  # PURPOSE: Hardware testing and wiring validation only
  # TODO: REMOVE BEFORE FINAL RELEASE
  ################################################################################

  - platform: template
    id: direct_gpio18_switch
    name: "12_01_Set GPIO18 - Water Valve to HIGH"
    optimistic: true
    restore_mode: ALWAYS_OFF
    icon: "mdi:electric-switch"
    turn_on_action:
      - output.turn_on: mag_valve_output
      - logger.log: "DIRECT GPIO18 (Water Valve) -> HIGH (bypassing all safety!)"
    turn_off_action:
      - output.turn_off: mag_valve_output
      - logger.log: "DIRECT GPIO18 (Water Valve) -> LOW"

  - platform: template
    id: direct_gpio19_switch
    name: "12_02_Set GPIO19 - Acid Pump to HIGH"
    optimistic: true
    restore_mode: ALWAYS_OFF
    icon: "mdi:electric-switch"
    turn_on_action:
