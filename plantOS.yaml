  # === Shelly-Controlled Actuators (Shelly Plus 4PM @ 192.168.0.130) ===
  # AirPump on Socket 0, WastewaterPump on Socket 2, GrowLight on Socket 3
  # Socket 1 reserved for future expansion
  # Uses ASG for debouncing based on actual Shelly state (polled every 5s)

  - platform: template
    id: air_pump_shelly_switch
    name: "10_06_Air Pump (Shelly Socket 0)"
    restore_mode: ALWAYS_OFF
    lambda: |-
      // Return actual state from HAL (synced via polling)
      return id(hal).getShellySwitchState(0);
    turn_on_action:
      # Use ASG for debouncing with actual Shelly state
      - lambda: |-
          if (id(actuator_safety).executeCommand("AirPump", true, 0)) {
            ESP_LOGI("switch", "Air Pump (Shelly Socket 0): ASG approved ON");
          } else {
            ESP_LOGD("switch", "Air Pump (Shelly Socket 0): ASG rejected (already ON or debounced)");
          }
    turn_off_action:
      - lambda: |-
          if (id(actuator_safety).executeCommand("AirPump", false, 0)) {
            ESP_LOGI("switch", "Air Pump (Shelly Socket 0): ASG approved OFF");
          } else {
            ESP_LOGD("switch", "Air Pump (Shelly Socket 0): ASG rejected (already OFF or debounced)");
          }

  - platform: template
