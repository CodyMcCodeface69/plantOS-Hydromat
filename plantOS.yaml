    turn_on_action:
      - logger.log:
          format: "Enabling periodic system status reports"
          level: INFO
      - lambda: |-
          // Enable status reports with current interval (10s) and verbose mode
          auto logger = id(unified_controller)->getStatusLogger();
          if (logger) {
            logger->configure(true, 10000, false);  // 10s interval, verbose off
          }
    turn_off_action:
