  - platform: template
    id: direct_gpio20_switch
    name: "12_03_Set GPIO20 - Nutrient Pump A to HIGH"
    optimistic: true
    restore_mode: ALWAYS_OFF
    icon: "mdi:electric-switch"
    turn_on_action:
      - output.turn_on: pump_grow_output
      - logger.log: "DIRECT GPIO20 (Nutrient Pump A) -> HIGH (bypassing all safety!)"
    turn_off_action:
      - output.turn_off: pump_grow_output
      - logger.log: "DIRECT GPIO20 (Nutrient Pump A) -> LOW"

  - platform: template
    id: direct_gpio21_switch
    name: "12_04_Set GPIO21 - Nutrient Pump B to HIGH"
    optimistic: true
    restore_mode: ALWAYS_OFF
    icon: "mdi:electric-switch"
    turn_on_action:
