################################################################################
# PlantOS HAL (Hardware Abstraction Layer) - Layer 3
#
# Provides platform-agnostic hardware interface for the unified Controller.
# Phase 2 implementation - hardware actuators connected.
################################################################################
plantos_hal:
  id: hal
  system_led: system_led
  ph_sensor: ph_sensor_real  # Real EZO pH UART sensor with filtering
  ph_sensor_component: ezo_ph_uart_component  # EZO pH UART component for calibration and direct readings
  light_sensor: light_intensity_raw  # KY-046 light sensor on GPIO0 (ADC1_CH0)
  temperature_sensor: water_temperature  # DS18B20 temperature sensor on GPIO16

  # Actuator Switches (Phase 2: Hardware Control - 6 actuators)
  # NOTE: Air pump removed - future Zigbee implementation
  mag_valve_switch: mag_valve_switch        # GPIO18 - Magnetic valve (fresh water inlet)
  pump_ph_switch: pump_ph_switch            # GPIO19 - pH pump (acid dosing)
  pump_grow_switch: pump_grow_switch        # GPIO20 - Grow pump (grow nutrients)
  pump_micro_switch: pump_micro_switch      # GPIO21 - Micro pump (micronutrients)
  pump_bloom_switch: pump_bloom_switch      # GPIO22 - Bloom pump (bloom nutrients)
  pump_wastewater_switch: pump_wastewater_switch  # GPIO23 - Wastewater pump (drainage)

  # pH Reading Configuration
  ph_reading_interval: 2h     # How often to check pH (default: 2 hours)
  ph_min: 5.5                  # Lower pH threshold (default: 5.5)
  ph_max: 6.5                  # Upper pH threshold (default: 6.5)
                               # If pH is outside this range, controller will
                               # transition to PH_PROCESSING state and decide
                               # whether to start pH correction

################################################################################
# PlantOS Unified Controller (Layer 1) - Phase 8
#
# Unified controller managing:
# - System FSM with 12 states
# - LED behaviors via LedBehaviorSystem
# - HAL integration for sensors/LED
# - SafetyGate integration for actuators
# - StatusLogger (owned internally, not injected)
# - PSM integration for crash recovery
#
# Architecture: Controller → SafetyGate → HAL → Hardware
################################################################################
plantos_controller:
  id: unified_controller
  hal: hal                       # Hardware abstraction layer
  safety_gate: actuator_safety   # Actuator control with safety enforcement
  persistence: psm               # Persistent state manager for crash recovery
  ph_sensor: ezo_ph_uart_component  # pH sensor for calibration control

  # Status Logger Configuration
  enable_status_reports: true   # Enable/disable periodic status reports (default: true)
  status_report_interval: 10s   # How often to print status reports (default: 30s)
  verbose_mode: false           # Enable instant verbose logging of all events (default: false)
                                # Verbose mode logs state changes, sensor readings, and actuator
                                # commands in real-time without waiting for periodic reports.
                                # Note: LED changes are automatically filtered out.

################################################################################
# Time Logger: Periodic Time Logging
#
# Demonstrates non-blocking periodic execution by logging the current date and
# time to the serial monitor. Uses NTP-synchronized time from the time component
# and formats output as: dd.mm.yyyy HH:MM:SS
#
# This component showcases:
# - Non-blocking delays using millis() instead of delay()
# - Integration with ESPHome's time component
# - Formatted time output for monitoring and debugging
################################################################################
time_logger:
  id: my_time_logger

  # time_source: ID reference to the time component (NTP-synchronized)
  # The logger queries this component for current date/time
  time_source: sntp_time

  # log_interval: How often to log the time (default: 5 seconds)
  # Accepts time strings: "1s", "5s", "10s", "1min", etc.
  log_interval: 30min

################################################################################
# Actuator Safety Gate - Centralized Actuator Control Safety Layer
#
# Provides comprehensive safety features for all system actuators:
# - Debouncing: Prevents redundant commands
# - Duration Limits: Enforces maximum runtime for critical actuators
# - Runtime Tracking: Monitors actuator runtime and detects violations
# - Safety Logging: Logs all rejections with clear reasons
# - Soft-Start/Soft-Stop: PWM ramping to protect circuits from inrush current
#
# This is a critical safety component that should be used for all actuators
# that could cause damage if left running too long (pumps, valves, heaters, etc.)
#
# Soft-Start/Soft-Stop Feature:
# When controlling pumps, motors, or other inductive loads via MOSFETs, use
# the soft-start/soft-stop feature to gradually ramp PWM duty cycle from 0% to
# 100% (or vice versa) over a configurable duration. This protects circuits from
# inrush current spikes and back-EMF damage.
#
# Usage Example (in lambda or script):
#   // Configure 2-second ramp duration for acid pump
#   id(actuator_safety).setRampDuration("AcidPump", 2000);
#
#   // Set maximum duration limit (safety feature)
#   id(actuator_safety).setMaxDuration("AcidPump", 30);
#
#   // Request pump ON - will start ramping up from 0% to 100%
#   if (id(actuator_safety).executeCommand("AcidPump", true, 10)) {
#     // Command approved - ramping started
#   }
#
#   // In an interval component (50-100ms recommended), apply duty cycle to PWM:
#   float duty = id(actuator_safety).getDutyCycle("AcidPump");
#   id(acid_pump_pwm).set_level(duty);  // Apply to LEDC output (0.0 to 1.0)
#
# See components/actuator_safety_gate/README.md for complete documentation.
################################################################################
################################################################################
# Actuator Safety Gate (Layer 2) - Phase 2 HAL Integration
#
# Centralized safety layer for all actuator control with:
# - Debouncing, Duration Limits, Runtime Tracking
# - Soft-Start/Soft-Stop ramping
# - HAL integration for hardware control
################################################################################
actuator_safety_gate:
  id: actuator_safety
  hal: hal  # Phase 2: Inject HAL dependency for hardware control

################################################################################
# EZO pH Sensor Component (Atlas Scientific)
#
# Production pH sensor using I2C communication with Atlas Scientific EZO circuit.
# Replaces dummy sensor for accurate pH monitoring in nutrient solutions.
#
# Hardware Requirements:
# - Atlas Scientific EZO pH Circuit
# - pH probe (included with EZO kit)
# - I2C connection to ESP32-C6 (SDA=GPIO6, SCL=GPIO7)
# - 3.3V power supply
#
# Calibration:
# - Use ESPHome API services to calibrate (see api section)
# - Mid-point: pH 7.00 buffer solution (required first)
# - Low-point: pH 4.00 buffer solution (optional)
# - High-point: pH 10.00 buffer solution (optional)
#
# Temperature Compensation:
# - Configure temperature_compensation parameter below
# - Links to a temperature sensor for improved accuracy
# - Improves accuracy from ±0.1 pH to ±0.02 pH
#
# IMPORTANT: New EZO sensors ship in UART mode!
# - Must send "I2C,97" command via UART first to switch to I2C mode at address 0x61
# - Or use hardware jumper if available on carrier board
#
# NOTE: This I2C version is DISABLED in favor of UART version below.
################################################################################
# ezo_ph:
#   id: ezo_ph_component
#   i2c_id: i2c_bus
#   address: 0x61  # Default I2C address for EZO pH circuit (97 decimal)
#   update_interval: 60s  # Read pH every 60 seconds (recommended for production)
#
#   # pH sensor configuration
#   ph:
#     name: "Nutrient Solution pH"
#     id: ph_sensor_real
#     accuracy_decimals: 2
#     filters:
#       # Sliding window moving average smooths out minor fluctuations
#       - sliding_window_moving_average:
#           window_size: 5     # Average last 5 readings
#           send_every: 1      # Publish every reading (after averaging)
#       # Lambda filter for range validation and outlier rejection
#       - lambda: |-
#           if (x < 0.0 || x > 14.0) {
#             ESP_LOGW("ezo_ph", "pH value out of typical range: %.2f", x);
#             return {};  // Reject outliers
#           }
#           return x;
#
#   # Optional: Temperature compensation for improved accuracy
#   # Uncomment and link to your temperature sensor when available
#   # temperature_compensation: water_temp_sensor

################################################################################
# EZO pH Sensor Component via UART (Atlas Scientific)
#
# Production pH sensor using UART communication with EZO Carrier pH Click board.
# This is the native communication mode for the MikroElektronika EZO carrier board.
#
# Hardware Requirements:
# - MikroElektronika EZO Carrier pH Click board
# - Atlas Scientific EZO pH Circuit (installed on carrier)
# - pH probe (included with EZO kit)
# - UART connection to ESP32-C6 (TX=GPIO4, RX=GPIO5)
# - 3.3V or 5V power supply (carrier has voltage regulator)
#
# Calibration:
# - Use ESPHome API services to calibrate (see api section)
# - Mid-point: pH 7.00 buffer solution (required first)
# - Low-point: pH 4.00 buffer solution (optional)
# - High-point: pH 10.00 buffer solution (optional)
#
# Temperature Compensation:
# - Configure temperature_compensation parameter below
# - Links to a temperature sensor for improved accuracy
# - Improves accuracy from ±0.1 pH to ±0.02 pH
#
# UART Protocol Details:
# - Baud Rate: 115200 (default for EZO carrier boards)
# - ASCII text commands terminated with \r (carriage return)
# - 300ms response delay required after each command
################################################################################
ezo_ph_uart:
  id: ezo_ph_uart_component
  uart_id: uart_bus
  update_interval: 5s  # Read pH every 60 seconds (recommended for production)
  verbose: true  # Enable detailed UART communication logging
  # pH sensor configuration
  ph:
    name: "Nutrient Solution pH"
    id: ph_sensor_real
    accuracy_decimals: 2
    filters:
      # Sliding window moving average smooths out minor fluctuations
      - sliding_window_moving_average:
          window_size: 5     # Average last 5 readings
          send_every: 1      # Publish every reading (after averaging)
      # Lambda filter for range validation and outlier rejection
      - lambda: |-
          if (x < 0.0 || x > 14.0) {
            ESP_LOGW("ezo_ph_uart", "pH value out of typical range: %.2f", x);
            return {};  // Reject outliers
          }
          return x;

  # Optional: Temperature compensation for improved accuracy
  # Uncomment and link to your temperature sensor when available
  # temperature_compensation: water_temp_sensor

################################################################################
# Dummy Actuator Trigger - Test Component for Safety Gate
#
# Automated test component that validates the ActuatorSafetyGate functionality
# by running periodic test sequences:
#
# Test 1 - Debouncing Protection:
#   - Attempts to turn ON actuator multiple times rapidly
#   - Expected: 1st command approved, 2nd command rejected (debouncing)
#
# Test 2 - Maximum Duration Enforcement:
#   - Requests 3-second duration (within 5s limit): approved
#   - Requests 10-second duration (exceeds 5s limit): rejected
#
# Test 3 - Normal Operation:
#   - Standard ON/OFF cycles with valid durations
#   - All commands should be approved
#
# Visual Feedback: LED on GPIO 4 controlled by safety gate approvals
# Test Interval: Runs test sequences every 15 seconds
################################################################################
# DEACTIVATED: Dummy Actuator Trigger test
# dummy_actuator_trigger:
#   id: test_trigger
#   safety_gate: actuator_safety
#   led_pin: GPIO4  # Test LED (GPIO 4 is free, GPIO 8 is built-in LED)
#   test_interval: 15s  # Run test sequences every 15 seconds

################################################################################
# Persistent State Manager - NVS-Based Critical Event Logging
#
# Manages critical event persistence across power cycles and crashes.
# Essential for operations that could cause damage if interrupted:
# - Chemical dosing (acid/base pumps)
# - Watering/valve operations
# - Calibration sequences
# - Any long-running critical process
#
# Features:
# - NVS (Non-Volatile Storage) persistence survives power loss
# - Time-based event age validation (requires NTP sync)
# - Recovery detection on boot
# - Atomic save/load operations
#
# Usage Example:
#   // Before starting critical operation
#   id(psm).logEvent("DOSING_ACID", 0);  // Status 0 = STARTED
#   turnOnAcidPump();
#
#   // After completing operation
#   turnOffAcidPump();
#   id(psm).clearEvent();  // Clear - operation completed
#
#   // On boot - check for recovery
#   if (id(psm).wasInterrupted(60)) {  // Within last 60 seconds
#       // Take recovery action (turn off pumps, etc.)
#   }
################################################################################
persistent_state_manager:
  id: psm

################################################################################
# WDT Manager - Hardware Watchdog Timer Management
#
# Manages the ESP32 hardware watchdog timer (WDT) to detect and recover from
# system hangs or crashes. The WDT must be regularly "fed" to indicate the
# system is healthy. If feeding stops, the WDT automatically resets the device.
#
# Features:
# - Hardware WDT initialization with 10-second timeout
# - Regular WDT feeding every 500ms during normal operation
# - Test mode: Simulates crash after 20 seconds to verify automatic reset
# - Non-blocking operation using millis() timing
#
# Configuration:
# - timeout: WDT timeout period (10 seconds)
# - feed_interval: How often to feed WDT (500ms)
# - test_mode: Enable crash simulation (true for testing)
# - crash_delay: Time before simulated crash (20 seconds)
#
# Expected Behavior (Test Mode):
# 1. Boot: "WDT initialized successfully"
# 2. 0-20s: Regular "WDT fed" messages every 500ms
# 3. 20s: "SIMULATED CRASH - Stopping WDT feeding"
# 4. ~30s: WDT timeout triggers automatic reboot
# 5. Device reboots and cycle repeats
#
# For Production: Set test_mode: false to disable crash simulation
################################################################################
wdt_manager:
  id: my_wdt
  timeout: 10s           # WDT timeout: 10 seconds
  feed_interval: 500ms   # Feed WDT every 500 milliseconds
  test_mode: false        # Enable crash simulation for testing
  crash_delay: 20s       # Simulate crash after 20 seconds

################################################################################
# I²C Mutex Protection - FreeRTOS Mutex for Thread-Safe I²C Bus Access
#
# PRODUCTION-READY: This component creates a global FreeRTOS Mutex that protects
# the shared I²C bus from concurrent access by multiple tasks.
#
# IMPORTANT: The mutex is ALWAYS created and available, regardless of test_mode.
# Other components can use I2CMutexDemo::i2c_mutex_ to protect their I²C operations.
#
# Modes of Operation:
# - test_mode: false (PRODUCTION, default)
#   * Mutex is created and available globally
#   * No test tasks are created (clean logs, no extra overhead)
#   * Use mutex in your I²C components for thread safety
#   * Component can even be commented out if not needed
#
# - test_mode: true (DEMONSTRATION)
#   * Mutex is created and available globally
#   * Two test tasks (Task_A, Task_B) demonstrate mutex usage
#   * Detailed serial logging shows mutex acquisition/release
#   * Educational - shows how mutex prevents concurrent I²C access
#
# Usage in Other Components:
# To protect I²C operations in your custom components, use:
#   xSemaphoreTake(I2CMutexDemo::i2c_mutex_, portMAX_DELAY);
#   // Your I²C operation here
#   xSemaphoreGive(I2CMutexDemo::i2c_mutex_);
#
# Expected Serial Monitor Output (test_mode: true):
# - [Task_A] Attempting to acquire I²C Mutex...
# - [Task_A] ✓ Mutex ACQUIRED - entering critical section
# - [Task_A] Performing I²C transaction (50ms delay)...
# - [Task_B] Attempting to acquire I²C Mutex... (BLOCKED, waiting)
# - [Task_A] ✓ Mutex RELEASED - exiting critical section
# - [Task_B] ✓ Mutex ACQUIRED - entering critical section (now can proceed)
#
# This proves mutual exclusion: only ONE task accesses I²C bus at a time.
################################################################################
i2c_mutex_demo:
  id: my_i2c_mutex_demo
  test_mode: false  # PRODUCTION: false = mutex only, no test tasks
                    # DEMO: true = mutex + test tasks with logging

################################################################################
# CalendarManager - Daily Schedule Management for 120-Day Grow Cycle
#
# Manages target pH values and nutrient dosing durations for each day.
# Current day is persisted to NVS and survives power cycles.
################################################################################
calendar_manager:
  id: plant_calendar

  # Safe mode: Disable automated time-based routines (manual control still works)
  safe_mode: false

  # Verbose mode: Enable detailed logging of all operations
  verbose: false

  # Status log interval: How often to report current day and schedule
  status_log_interval: 30s

  # Schedule JSON: 120-day schedule (currently showing days 1-3 as example)
  # Full production schedule would contain all 120 days
  schedule_json: >-
    [
      {"day": 1, "ph_min": 5.8, "ph_max": 6.2, "dose_A_ms": 500, "dose_B_ms": 1200, "dose_C_ms": 800},
      {"day": 2, "ph_min": 5.8, "ph_max": 6.3, "dose_A_ms": 600, "dose_B_ms": 1300, "dose_C_ms": 900},
      {"day": 3, "ph_min": 5.9, "ph_max": 6.3, "dose_A_ms": 700, "dose_B_ms": 1400, "dose_C_ms": 1000}
    ]

################################################################################
# Switch Components - Manual Controls (02 - Security)
#
# Template switches for manual control of the unified controller.
################################################################################
switch:
  # === 02 - Safety Gate Control ===
  - platform: template
    id: safety_gate_enabled
    name: "02_01_Enable Actuator Safety Gate"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON  # Safety gate enabled by default
    turn_on_action:
      - lambda: |-
          ESP_LOGI("switch", "Actuator Safety Gate ENABLED");
          id(actuator_safety)->setEnabled(true);
    turn_off_action:
      - lambda: |-
          ESP_LOGW("switch", "Actuator Safety Gate DISABLED - manual control mode");
          id(actuator_safety)->setEnabled(false);

  # === 10 - Actuator Control (Manual Toggle Switches via Safety Gate) ===
  # These switches toggle actuators through the safety gate for monitored control
  # Safety gate will auto-shutoff if max duration exceeded
  # Note: optimistic=true, switches show intended state (not actual hardware state)
  - platform: template
    id: mag_valve_switch
    name: "10_01_Magnetic Valve"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("WaterValve", true, 0)) {
            ESP_LOGW("switch", "Magnetic Valve: ON command REJECTED by safety gate");
          }
    turn_off_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("WaterValve", false)) {
            ESP_LOGW("switch", "Magnetic Valve: OFF command REJECTED by safety gate");
          }

  - platform: template
    id: pump_ph_switch
    name: "10_02_pH Pump"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("AcidPump", true, 0)) {
            ESP_LOGW("switch", "pH Pump: ON command REJECTED by safety gate");
          }
    turn_off_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("AcidPump", false)) {
            ESP_LOGW("switch", "pH Pump: OFF command REJECTED by safety gate");
          }

  - platform: template
    id: pump_grow_switch
    name: "10_03_Grow Pump"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("NutrientPumpA", true, 0)) {
            ESP_LOGW("switch", "Grow Pump: ON command REJECTED by safety gate");
          }
    turn_off_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("NutrientPumpA", false)) {
            ESP_LOGW("switch", "Grow Pump: OFF command REJECTED by safety gate");
          }

  - platform: template
    id: pump_micro_switch
    name: "10_04_Micro Pump"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("NutrientPumpB", true, 0)) {
            ESP_LOGW("switch", "Micro Pump: ON command REJECTED by safety gate");
          }
    turn_off_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("NutrientPumpB", false)) {
            ESP_LOGW("switch", "Micro Pump: OFF command REJECTED by safety gate");
          }

  - platform: template
    id: pump_bloom_switch
    name: "10_05_Bloom Pump"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("NutrientPumpC", true, 0)) {
            ESP_LOGW("switch", "Bloom Pump: ON command REJECTED by safety gate");
          }
    turn_off_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("NutrientPumpC", false)) {
            ESP_LOGW("switch", "Bloom Pump: OFF command REJECTED by safety gate");
          }

  - platform: template
    id: pump_wastewater_switch
    name: "10_06_Wastewater Pump"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("WastewaterPump", true, 0)) {
            ESP_LOGW("switch", "Wastewater Pump: ON command REJECTED by safety gate");
          }
    turn_off_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("WastewaterPump", false)) {
            ESP_LOGW("switch", "Wastewater Pump: OFF command REJECTED by safety gate");
          }

  # NOTE: Air Pump removed - future Zigbee implementation

  # === pH Sensor Control ===
  - platform: template
    name: "07_03_Enable Continuous pH Reading"
    id: continuous_ph_reading_switch
    optimistic: true
    turn_on_action:
      # Enable continuous reading mode (C,1)
      # Sensor outputs pH every second automatically
      # WARNING: This interferes with normal polling operation
      then:
        - lambda: |-
            ESP_LOGI("switch", "Enabling continuous pH reading mode");
            id(ezo_ph_uart_component)->enable_continuous_reading();
    turn_off_action:
      # Disable continuous reading mode (C,0)
      # Returns sensor to command mode (default)
      then:
        - lambda: |-
            ESP_LOGI("switch", "Disabling continuous pH reading mode");
            id(ezo_ph_uart_component)->disable_continuous_reading();

################################################################################
# GPIO Status Logger (DEBUG Mode)
#
# Periodically logs GPIO pin status for all used pins in the system.
# Shows InputEn, OutputEn, and current level for each GPIO.
# Only active in DEBUG logger mode.
################################################################################
interval:
  - interval: 30s
    then:
      - lambda: |-
          // GPIO Status Logger - Simple level reading
          // Note: ESP-IDF doesn't provide easy public API for reading input/output enable
          // so we only log the current GPIO level (0=LOW, 1=HIGH)

          auto log_gpio = [](int pin, const char* name) {
            int level = gpio_get_level((gpio_num_t)pin);
            ESP_LOGD("gpio_status", "GPIO[%d] %-20s| Level: %d", pin, name, level);
          };

          ESP_LOGD("gpio_status", "");
          ESP_LOGD("gpio_status", "=== GPIO Status Report ===");

          // Sensors
          log_gpio(0, "Light Sensor (ADC)");
          log_gpio(4, "EZO pH UART TX");
          log_gpio(5, "EZO pH UART RX");

          // I2C Bus
          log_gpio(6, "I2C SDA");
          log_gpio(7, "I2C SCL");

          // System LED
          log_gpio(8, "System LED (WS2812)");

          // Water Level Sensors (future - XKC-Y23-V)
          log_gpio(10, "Water Level HIGH");
          log_gpio(11, "Water Level LOW");

          // Temperature Sensor (relocated from GPIO10)
          log_gpio(16, "Water Temp (1-Wire)");

          // Actuators (Active HIGH outputs)
          log_gpio(18, "Water Valve (Mag)");
          log_gpio(19, "Acid Pump (pH)");
          log_gpio(20, "Nutrient Pump (Grow)");
          log_gpio(21, "Nutrient Pump (Micro)");
          log_gpio(22, "Nutrient Pump (Bloom)");
          log_gpio(23, "Wastewater Pump");

          ESP_LOGD("gpio_status", "=========================");
          ESP_LOGD("gpio_status", "");


