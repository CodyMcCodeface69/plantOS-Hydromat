    turn_off_action:
      - logger.log:
          format: "Disabling verbose logging for: dallas.temp.sensor"
          level: INFO
      - lambda: |-
          esp_log_level_set("dallas.temp.sensor", ESP_LOG_INFO);

  - platform: template
    name: "11_06_Verbose: PlantOS Controller"
    id: verbose_controller
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:bug-outline"
    turn_on_action:
      - logger.log:
          format: "Enabling verbose logging for: plantos_controller"
          level: INFO
      - lambda: |-
          esp_log_level_set("plantos_controller", ESP_LOG_DEBUG);
    turn_off_action:
      - logger.log:
          format: "Disabling verbose logging for: plantos_controller"
          level: INFO
      - lambda: |-
          esp_log_level_set("plantos_controller", ESP_LOG_INFO);

  - platform: template
    name: "11_07_Verbose: GPIO Status"
    id: verbose_gpio_status
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:bug-outline"
    turn_on_action:
      - logger.log:
          format: "Enabling verbose logging for: gpio_status"
          level: INFO
      - lambda: |-
          esp_log_level_set("gpio_status", ESP_LOG_DEBUG);
    turn_off_action:
      - logger.log:
          format: "Disabling verbose logging for: gpio_status"
          level: INFO
      - lambda: |-
          esp_log_level_set("gpio_status", ESP_LOG_INFO);

  - platform: template
    name: "11_08_Verbose: Component Warnings"
    id: verbose_component
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:bug-outline"
    turn_on_action:
      - logger.log:
          format: "Enabling verbose logging for: component"
          level: INFO
      - lambda: |-
          esp_log_level_set("component", ESP_LOG_DEBUG);
    turn_off_action:
      - logger.log:
          format: "Disabling verbose logging for: component (suppressing timing warnings)"
          level: INFO
      - lambda: |-
          esp_log_level_set("component", ESP_LOG_ERROR);

  - platform: template
    name: "11_09_Verbose: ESP-IDF Framework"
    id: verbose_esp_idf
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:bug-outline"
