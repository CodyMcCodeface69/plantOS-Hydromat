################################################################################
# PlantOS Hardware Configuration
#
# This file defines the complete hardware setup and component interconnections
# for the ESP32-C6 based plant monitoring system.
################################################################################

esphome:
  name: plantos

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    # ESP-IDF is chosen over Arduino for:
    # - Better RISC-V support on ESP32-C6 (newer chip architecture)
    # - More direct hardware access and lower-level control
    # - Better performance for real-time LED control (RMT peripheral)
    # - Official Espressif support and documentation
    type: esp-idf
    version: recommended

logger:
  # DEBUG level enables detailed component logging for development
  # This helps diagnose FSM state transitions and sensor callbacks
  # In production, consider INFO or WARN to reduce log noise
  level: INFO
  # ESP32-C6 uses built-in USB Serial/JTAG controller for logging
  # This must be explicitly configured or boot will hang
  hardware_uart: USB_SERIAL_JTAG

wifi:
  # Credentials stored in secrets.yaml (gitignored) for security
  # This allows OTA updates and web interface access
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Static IP configuration for consistent web UI access
  # Uncomment if you want a fixed IP address
  # manual_ip:
  #   static_ip: 192.168.0.201
  #   gateway: 192.168.0.1
  #   subnet: 255.255.255.0
  #   dns1: 192.168.0.1

  # WiFi optimization for mesh networks (TP-Link Deco, etc.)
  # These settings improve compatibility with WiFi mesh systems
  # Mesh settings: Deactivate Fast Roaming and Beamforming, Deactiate Mesh for plantOS client, Deactivate 5 GHz band 
  power_save_mode: none    # Disable power saving for better connectivity
  fast_connect: true       # Skip channel scanning for faster connection

  # Force WiFi B/G mode by disabling 802.11n/ac features
  # This helps with mesh network compatibility and web server access
  output_power: 8.5dB      # Lower output power for better mesh compatibility
  enable_btm: false        # Disable 802.11v BSS Transition Management
  enable_rrm: false        # Disable 802.11k Radio Resource Management

  # Reboot on connection failure after timeout
  # Helps recover from transient WiFi issues without manual intervention
  reboot_timeout: 2min

  # ==============================================================
  # FALLBACK ACCESS POINT (AP) FÜR DEBUG-ZWECKE
  # WICHTIG: Wenn der Chip das Haupt-WLAN (Datenautobahn) NICHT findet,
  # erstellt er dieses temporäre WLAN. Verbinden Sie sich damit, um
  # die Live-Logs im Browser unter http://192.168.4.1 zu sehen.
  # ==============================================================
  ap:
    ssid: "PlantOS-Fallback"
    password: "debug123"
ota:
  # ESPHome OTA allows firmware updates over WiFi without USB cable
  # Critical for deployed devices in hard-to-reach locations (e.g., greenhouse)
  - platform: esphome

web_server:
  # Provides real-time sensor data and component control via browser
  # Accessible at device IP on port 80 (standard HTTP)
  # Useful for debugging and monitoring without serial connection
  version: 2
  #local: true  # Embed all JS/CSS locally for offline operation
  port: 80

################################################################################
# Time Synchronization: NTP
#
# Synchronizes the ESP32's system time with Network Time Protocol (NTP) servers.
# This enables accurate timestamping for logs, sensor data, and scheduled actions.
################################################################################
time:
  - platform: sntp
    id: sntp_time
    # NTP servers for time synchronization (pool.ntp.org provides load-balanced servers)
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

    # Central European Time (CET/CEST)
    # CET: UTC+1 (winter) - standard offset: 3600 seconds
    # CEST: UTC+2 (summer) - daylight saving adds 3600 seconds
    # ESPHome format: "TZ_database_name" or "STD offset DST,rule"
    timezone: "CET-1CEST,M3.5.0,M10.5.0/3"
    # Format explanation: CET-1CEST,M3.5.0,M10.5.0/3
    # - CET-1: Standard time zone (CET), offset is UTC+1 (specified as -1)
    # - CEST: Daylight saving time zone name
    # - M3.5.0: DST starts last (5th) Sunday (0) of March (M3) at 02:00
    # - M10.5.0/3: DST ends last (5th) Sunday (0) of October (M10) at 03:00

    # Update interval: how often to sync with NTP servers
    # Default 15min is reasonable; too frequent can overload servers
    update_interval: 15min

    # Callback when time is synchronized
    on_time_sync:
      then:
        - logger.log: "System time synchronized with NTP server"

external_components:
  # Points to local custom components directory
  # ESPHome will compile and link C++ code from here alongside generated code
  - source: components

################################################################################
# I²C Bus Configuration
#
# Configures the I²C bus for communication with external sensors and peripherals.
# I²C (Inter-Integrated Circuit) is a multi-master, multi-slave serial communication
# protocol commonly used for sensor integration.
#
# ESP32-C6 I²C Pins:
# - SDA (Serial Data): GPIO6 (default) - bidirectional data line
# - SCL (Serial Clock): GPIO7 (default) - clock signal line
#
# IMPORTANT: I²C requires external pull-up resistors on SDA and SCL lines
# - Typical values: 4.7kΩ to 10kΩ (4.7kΩ recommended for most applications)
# - Pull-ups connect SDA/SCL to 3.3V
# - Without pull-ups, I²C communication will fail
#
# Bus Speed:
# - 100kHz: Standard mode (default, most compatible)
# - 400kHz: Fast mode (higher speed, may require lower pull-up resistance)
################################################################################
i2c:
  id: i2c_bus
  sda: GPIO6  # Serial Data Line (change if using different pins)
  scl: GPIO7  # Serial Clock Line (change if using different pins)
  scan: false  # Disable ESPHome's automatic scan (we use our custom scanner)
  frequency: 100kHz  # Standard mode - change to 400kHz for fast mode if needed

################################################################################
# I²C Bus Scanner
#
# Scans the I²C bus for connected devices and validates critical device presence.
# This component provides comprehensive diagnostic information during boot and
# optionally during runtime.
#
# FEATURES:
# - Scans all valid 7-bit I²C addresses (0x01 to 0x77)
# - Identifies connected devices by address
# - Validates critical device presence for PlantOS operation
# - Detailed logging with warnings for missing critical devices
#
# SCAN MODES:
# - Boot-time scan: Runs once during setup (scan_on_boot: true)
# - Periodic scan: Runs at interval (scan_interval: >0)
# - Disabled: Set scan_on_boot: false and scan_interval: 0s
#
# CRITICAL DEVICES:
# Define the I²C devices required for your PlantOS configuration.
# Common PlantOS devices:
# - 0x48: ADS1115 (16-bit ADC for analog sensors)
# - 0x20: MCP23017 (16-bit GPIO expander)
# - 0x76: BME280 (temperature/humidity/pressure sensor)
# - 0x68: DS3231 (RTC for timekeeping)
################################################################################
i2c_scanner:
  id: my_i2c_scanner
  i2c_id: i2c_bus

  # Link to controller for status reporting
  # This enables I²C scan results to appear in the central status logger
  status_logger: my_controller

  # Scan once at boot to validate hardware setup
  scan_on_boot: true

  # Periodic scanning (0s = disabled, only boot-time scan)
  # Set to 30s, 60s, etc. to detect hot-plug events or hardware failures
  scan_interval: 5s

  # Verbose mode: Enable detailed I²C scan logging to serial
  # true (default): Log detailed scan results every scan_interval
  # false: Silent mode - only report to central status logger
  verbose: false

  # Define critical devices for your PlantOS system
  # Uncomment and modify based on your hardware configuration
  critical_devices: []
    # - address: 0x48
    #   name: "ADS1115 ADC"
    # - address: 0x20
    #   name: "MCP23017 GPIO Expander"
    # - address: 0x76
    #   name: "BME280 Sensor"
    # - address: 0x68
    #   name: "DS3231 RTC"

################################################################################
# Visual Feedback: WS2812 RGB LED
#
# The built-in LED serves as the primary user interface, displaying system
# state via color and animation patterns controlled by the FSM.
################################################################################
light:
  - platform: esp32_rmt_led_strip
    # ESP32-C6-DevKitC-1 has a WS2812 RGB LED hard-wired to GPIO 8
    pin: 8
    num_leds: 1
    rgb_order: RGB
    name: "Built-in LED"
    id: system_led
    chipset: WS2812

    # default_transition_length: 0s disables automatic color smoothing
    # WHY: The FSM controller implements its own timing and animations
    # (breathing effect, blinking). ESPHome's built-in transitions would
    # interfere with precise FSM-driven visual feedback, creating lag or
    # blending between states. Instant transitions give the controller
    # full control over every frame.
    default_transition_length: 0s

################################################################################
# Sensor Input: Dummy Sensor
#
# Development/testing sensor that generates predictable cycling values.
# In production, replace with actual plant sensors (moisture, light, etc.)
################################################################################
sensor:
  - id: sensor_dummy_id
    platform: sensor_dummy
    name: "Dummy Sensor"

    # 1 second polling interval provides frequent updates for responsive
    # controller behavior without overwhelming the ESP32 event loop.
    # Real sensors might use different intervals based on measurement
    # characteristics (e.g., soil moisture changes slowly, could poll every 60s)
    update_interval: 1s

  # Sensor Filter: Robust Averaging with Outlier Rejection
  #
  # Filters the raw sensor data using robust averaging to reject outliers.
  # This improves data quality by removing sensor spikes, noise, and glitches.
  - id: sensor_filtered_id
    platform: sensor_filter
    name: "Filtered Sensor"

    # sensor_source: The raw sensor to filter
    sensor_source: sensor_dummy_id

    # window_size: Number of readings to collect before calculating average
    # 20 readings = good balance between responsiveness and filtering
    window_size: 20

    # reject_percentage: Percentage to reject from each end (0.0 to 0.5)
    # 0.10 = reject 10% lowest + 10% highest = 20% total outlier rejection
    # With 20 readings: rejects 2 lowest + 2 highest = averages middle 16 values
    reject_percentage: 0.10

################################################################################
# Text Sensor: Controller State
#
# Publishes the current FSM state to the web UI for monitoring and debugging.
# Shows state names: INIT, CALIBRATION, READY, ERROR
################################################################################
text_sensor:
  - platform: template
    name: "Controller State"
    id: controller_state_text
    # Text sensors don't have numerical state, just publish strings
    # The controller will call publish_state() to update this

  - platform: template
    name: "Verbose Mode Status"
    id: verbose_mode_status
    # Shows current verbose logging status: ON or OFF
    # Updated when verbose mode is toggled
    lambda: |-
      return id(my_controller)->get_verbose() ? std::string("ON") : std::string("OFF");
    # Update every 5 seconds to show current status
    update_interval: 5s

################################################################################
# Button: Reset Controller
#
# Provides a manual reset button in the web UI to force the controller back
# to INIT state. Useful for testing, debugging, and manual recalibration.
################################################################################
button:
  - platform: template
    name: "Reset Controller"
    on_press:
      # Lambda action calls the controller's reset_to_init() method
      # This triggers an immediate transition to INIT state
      then:
        - lambda: |-
            id(my_controller)->reset_to_init();

  - platform: template
    name: "Clear PSM Alerts"
    on_press:
      # Lambda action calls the PSM's clearEvent() method
      # This clears any critical events logged to NVS
      then:
        - lambda: |-
            id(psm)->clearEvent();

  - platform: template
    name: "Reconnect WiFi"
    on_press:
      # Force WiFi to disconnect and reconnect
      # Useful for troubleshooting mesh network connectivity issues
      then:
        - logger.log: "Forcing WiFi reconnection..."
        - wifi.disable:
        - delay: 2s
        - wifi.enable:
        - logger.log: "WiFi reconnection initiated"

  - platform: template
    name: "Toggle Verbose Logging"
    on_press:
      # Toggle verbose mode on/off at runtime
      # Enables/disables detailed logging of all controller actions and state transitions
      # Useful for debugging without reflashing firmware
      then:
        - lambda: |-
            id(my_controller)->toggle_verbose();

################################################################################
# System Controller: Finite State Machine
#
# The controller is the "brain" of plantOS, implementing a finite state machine
# that processes sensor data and drives LED visual feedback. This architecture
# cleanly separates:
# - Input (sensor_source): What data to monitor
# - Logic (controller FSM): How to interpret data and manage states
# - Output (light_target): How to display system status
#
# Component linking by ID enables:
# 1. Loose coupling: Swap sensors/LEDs without changing controller code
# 2. Type safety: ESPHome validates IDs at compile time
# 3. Testability: Different configurations can reuse the same controller logic
################################################################################
controller:
  id: my_controller

  # sensor_source: ID reference to any ESPHome sensor component
  # The controller subscribes to this sensor's state changes via callback
  # UPDATED: Now using filtered sensor for robust, outlier-free data
  sensor_source: sensor_filtered_id

  # light_target: ID reference to any ESPHome light component
  # The controller calls the light's API to set colors/brightness
  light_target: system_led

  # state_text: ID reference to a text sensor for FSM state publishing
  # The controller will publish state changes (INIT, CALIBRATION, READY, ERROR)
  # to this text sensor for display in the web UI
  state_text: controller_state_text

  # verbose: Enable detailed logging of all controller actions and state transitions
  # When enabled, logs:
  # - State transitions with time spent in each state
  # - Every action taken (LED updates, sensor checks, etc.)
  # - Timing information for each action (how long it took)
  # Useful for debugging FSM behavior and performance profiling
  # Default: false (minimal logging)
  verbose: true

  # status_log_interval: How often to print central status logger reports
  # Controls the frequency of comprehensive system status reports
  # Default: 30s (prints status every 30 seconds)
  # Common values: 10s, 30s, 1min, 5min
  status_log_interval: 30s

################################################################################
# Time Logger: Periodic Time Logging
#
# Demonstrates non-blocking periodic execution by logging the current date and
# time to the serial monitor. Uses NTP-synchronized time from the time component
# and formats output as: dd.mm.yyyy HH:MM:SS
#
# This component showcases:
# - Non-blocking delays using millis() instead of delay()
# - Integration with ESPHome's time component
# - Formatted time output for monitoring and debugging
################################################################################
time_logger:
  id: my_time_logger

  # time_source: ID reference to the time component (NTP-synchronized)
  # The logger queries this component for current date/time
  time_source: sntp_time

  # log_interval: How often to log the time (default: 5 seconds)
  # Accepts time strings: "1s", "5s", "10s", "1min", etc.
  log_interval: 1min

################################################################################
# IP Logger: Periodic IP Address Logging
#
# DISABLED: IP logging is now handled by the central status logger, which
# provides comprehensive system status including IP address, web server status,
# sensor readings, FSM state, and alerts in a unified format.
#
# The central status logger logs every 30 seconds and provides much more
# context than the standalone IP logger.
################################################################################
# ip_logger:
#   id: my_ip_logger
#
#   # log_interval: How often to log the IP address (default: 30 seconds)
#   # Accepts time strings: "10s", "30s", "1min", etc.
#   log_interval: 30s

################################################################################
# Network Status Update Automation
#
# Periodically updates the central status logger with network information:
# - Current IP address from WiFi component
# - Web server online status
#
# Runs every 30 seconds to keep network status current in the logger.
################################################################################
interval:
  - interval: 30s
    then:
      - lambda: |-
          // Update IP address in status logger
          #ifdef USE_WIFI
          if (wifi::global_wifi_component->is_connected()) {
            auto addresses = wifi::global_wifi_component->get_ip_addresses();
            if (!addresses.empty()) {
              id(my_controller)->get_logger()->updateIP(addresses[0].str().c_str());
            }
          } else {
            id(my_controller)->get_logger()->updateIP("Not Connected");
          }
          #endif

          // Update web server status
          // ESPHome web server is always running once configured
          #ifdef USE_WEBSERVER
          id(my_controller)->get_logger()->updateWebServerStatus(true, false);
          #endif

################################################################################
# Actuator Safety Gate - Centralized Actuator Control Safety Layer
#
# Provides comprehensive safety features for all system actuators:
# - Debouncing: Prevents redundant commands
# - Duration Limits: Enforces maximum runtime for critical actuators
# - Runtime Tracking: Monitors actuator runtime and detects violations
# - Safety Logging: Logs all rejections with clear reasons
#
# This is a critical safety component that should be used for all actuators
# that could cause damage if left running too long (pumps, valves, heaters, etc.)
################################################################################
# DEACTIVATED: Actuator Safety Gate test
# actuator_safety_gate:
#   id: actuator_safety

################################################################################
# Dummy Actuator Trigger - Test Component for Safety Gate
#
# Automated test component that validates the ActuatorSafetyGate functionality
# by running periodic test sequences:
#
# Test 1 - Debouncing Protection:
#   - Attempts to turn ON actuator multiple times rapidly
#   - Expected: 1st command approved, 2nd command rejected (debouncing)
#
# Test 2 - Maximum Duration Enforcement:
#   - Requests 3-second duration (within 5s limit): approved
#   - Requests 10-second duration (exceeds 5s limit): rejected
#
# Test 3 - Normal Operation:
#   - Standard ON/OFF cycles with valid durations
#   - All commands should be approved
#
# Visual Feedback: LED on GPIO 4 controlled by safety gate approvals
# Test Interval: Runs test sequences every 15 seconds
################################################################################
# DEACTIVATED: Dummy Actuator Trigger test
# dummy_actuator_trigger:
#   id: test_trigger
#   safety_gate: actuator_safety
#   led_pin: GPIO4  # Test LED (GPIO 4 is free, GPIO 8 is built-in LED)
#   test_interval: 15s  # Run test sequences every 15 seconds

################################################################################
# Persistent State Manager - NVS-Based Critical Event Logging
#
# Manages critical event persistence across power cycles and crashes.
# Essential for operations that could cause damage if interrupted:
# - Chemical dosing (acid/base pumps)
# - Watering/valve operations
# - Calibration sequences
# - Any long-running critical process
#
# Features:
# - NVS (Non-Volatile Storage) persistence survives power loss
# - Time-based event age validation (requires NTP sync)
# - Recovery detection on boot
# - Atomic save/load operations
#
# Usage Example:
#   // Before starting critical operation
#   id(psm).logEvent("DOSING_ACID", 0);  // Status 0 = STARTED
#   turnOnAcidPump();
#
#   // After completing operation
#   turnOffAcidPump();
#   id(psm).clearEvent();  // Clear - operation completed
#
#   // On boot - check for recovery
#   if (id(psm).wasInterrupted(60)) {  // Within last 60 seconds
#       // Take recovery action (turn off pumps, etc.)
#   }
################################################################################
persistent_state_manager:
  id: psm

################################################################################
# PSM Checker - Persistent State Manager Test Component
#
# Automated test component that validates PSM recovery functionality.
#
# Test Procedure:
# 1. On first boot:
#    - Logs "PSM_TEST" event to NVS
#    - Triggers controller ERROR_TEST state (pulsing blue/purple LED)
#    - Prompts user to UNPLUG device
#
# 2. After unplugging and replugging:
#    - Detects "PSM_TEST" event recovered from NVS
#    - Verifies event timestamp and details
#    - Logs "PSM TEST SUCCESSFUL" message
#    - Clears test event from NVS
#
# Visual Indicators:
# - Blue/purple pulsing LED = ERROR_TEST state active (ready to unplug)
# - Normal boot sequence after replug = recovery successful
#
# Log Messages to Watch For:
# - Boot 1: "PLEASE UNPLUG THE DEVICE NOW!"
# - Boot 2: "✓ PSM TEST SUCCESSFUL!" and "Event recovered from NVS"
#
# Test Interval: 0s (run once on boot, don't repeat)
################################################################################
# DEACTIVATED: PSM Checker test
# psm_checker:
#   id: psm_test
#   psm: psm
#   controller: my_controller
#   test_interval: 0s  # Run once on boot only

################################################################################
# WDT Manager - Hardware Watchdog Timer Management
#
# Manages the ESP32 hardware watchdog timer (WDT) to detect and recover from
# system hangs or crashes. The WDT must be regularly "fed" to indicate the
# system is healthy. If feeding stops, the WDT automatically resets the device.
#
# Features:
# - Hardware WDT initialization with 10-second timeout
# - Regular WDT feeding every 500ms during normal operation
# - Test mode: Simulates crash after 20 seconds to verify automatic reset
# - Non-blocking operation using millis() timing
#
# Configuration:
# - timeout: WDT timeout period (10 seconds)
# - feed_interval: How often to feed WDT (500ms)
# - test_mode: Enable crash simulation (true for testing)
# - crash_delay: Time before simulated crash (20 seconds)
#
# Expected Behavior (Test Mode):
# 1. Boot: "WDT initialized successfully"
# 2. 0-20s: Regular "WDT fed" messages every 500ms
# 3. 20s: "SIMULATED CRASH - Stopping WDT feeding"
# 4. ~30s: WDT timeout triggers automatic reboot
# 5. Device reboots and cycle repeats
#
# For Production: Set test_mode: false to disable crash simulation
################################################################################
wdt_manager:
  id: my_wdt
  timeout: 10s           # WDT timeout: 10 seconds
  feed_interval: 500ms   # Feed WDT every 500 milliseconds
  test_mode: false        # Enable crash simulation for testing
  crash_delay: 20s       # Simulate crash after 20 seconds

