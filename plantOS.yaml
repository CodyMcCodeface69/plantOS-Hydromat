    {"day": 118, "ph_min": 5.8, "ph_max": 6.2, "dose_A_ml_per_L": 0.0, "dose_B_ml_per_L": 0.0, "dose_C_ml_per_L": 0.0, "light_on_time": 960, "light_off_time": 240},
    {"day": 119, "ph_min": 5.8, "ph_max": 6.2, "dose_A_ml_per_L": 0.0, "dose_B_ml_per_L": 0.0, "dose_C_ml_per_L": 0.0, "light_on_time": 960, "light_off_time": 240},
    {"day": 120, "ph_min": 5.8, "ph_max": 6.2, "dose_A_ml_per_L": 0.0, "dose_B_ml_per_L": 0.0, "dose_C_ml_per_L": 0.0, "light_on_time": 960, "light_off_time": 240}
    ]
################################################################################
switch:
  # === 01 - Air Pump Control ===
  - platform: template
    id: air_pump_cycling_switch
    name: "01_04_Air Pump Cycling"
    restore_mode: RESTORE_DEFAULT_OFF  # Default to Normal mode (24/7 ON)
    optimistic: true
    icon: "mdi:air-purifier"
    turn_on_action:
      # Enable intermittent cycling for air pump
      # Uses periods configured via number sliders (01_05 and 01_06)
      # Starts with ON cycle immediately
      - lambda: |-
          uint32_t on_period = (uint32_t)id(air_pump_on_period).state;
          uint32_t off_period = (uint32_t)id(air_pump_off_period).state;

          ESP_LOGI("switch", "=== Air Pump Cycling ENABLED ===");
          ESP_LOGI("switch", "ON period: %u seconds", on_period);
          ESP_LOGI("switch", "OFF period: %u seconds", off_period);

          id(actuator_safety)->setCyclingPeriods("AirPump", on_period, off_period);
          id(actuator_safety)->enableCycling("AirPump", true);

          ESP_LOGI("switch", "Air pump will cycle: %us ON, %us OFF", on_period, off_period);
          ESP_LOGI("switch", "Starting with ON cycle");
          ESP_LOGI("switch", "================================");
    turn_off_action:
      # Disable intermittent cycling and enable Normal mode (24/7 ON)
      - lambda: |-
          ESP_LOGI("switch", "=== Air Pump: NORMAL MODE (24/7 ON) ===");
          id(actuator_safety)->enableCycling("AirPump", false);
          ESP_LOGI("switch", "Cycling disabled - air pump will run continuously");
          ESP_LOGI("switch", "Controller will turn ON pump within 30 seconds");
          ESP_LOGI("switch", "========================================");

  # === 02 - Safety Gate Control ===
  - platform: template
    id: safety_gate_enabled
    name: "02_01_Enable Actuator Safety Gate"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON  # Safety gate enabled by default
    turn_on_action:
      - lambda: |-
          ESP_LOGI("switch", "Actuator Safety Gate ENABLED");
          id(actuator_safety)->setEnabled(true);
    turn_off_action:
      - lambda: |-
          ESP_LOGW("switch", "Actuator Safety Gate DISABLED - manual control mode");
          id(actuator_safety)->setEnabled(false);

  # === 10 - Actuator Control (Manual Toggle Switches via Safety Gate) ===
  # These switches toggle actuators through the safety gate for monitored control
  # Safety gate will auto-shutoff if max duration exceeded
  # Note: optimistic=true, switches show intended state (not actual hardware state)
  - platform: template
    id: mag_valve_switch
    name: "10_01_Magnetic Valve"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("WaterValve", true, 0)) {
            ESP_LOGW("switch", "Magnetic Valve: ON command REJECTED by safety gate");
          }
    turn_off_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("WaterValve", false)) {
            ESP_LOGW("switch", "Magnetic Valve: OFF command REJECTED by safety gate");
          }

  - platform: template
    id: pump_ph_switch
    name: "10_02_pH Pump"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("AcidPump", true, 0)) {
            ESP_LOGW("switch", "pH Pump: ON command REJECTED by safety gate");
          }
    turn_off_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("AcidPump", false)) {
            ESP_LOGW("switch", "pH Pump: OFF command REJECTED by safety gate");
          }

  # Nutrient Pump Switches (Grow = NutrientPumpA, Micro = NutrientPumpB, Bloom = NutrientPumpC)
  - platform: template
    id: pump_grow_switch
    name: "10_03_Grow Pump"    # NutrientPumpA → nutrient_A_ml_per_liter (GPIO20)
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("NutrientPumpA", true, 0)) {
            ESP_LOGW("switch", "Grow Pump: ON command REJECTED by safety gate");
          }
    turn_off_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("NutrientPumpA", false)) {
            ESP_LOGW("switch", "Grow Pump: OFF command REJECTED by safety gate");
          }

  - platform: template
    id: pump_micro_switch
    name: "10_04_Micro Pump"   # NutrientPumpB → nutrient_B_ml_per_liter (GPIO21)
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("NutrientPumpB", true, 0)) {
            ESP_LOGW("switch", "Micro Pump: ON command REJECTED by safety gate");
          }
    turn_off_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("NutrientPumpB", false)) {
            ESP_LOGW("switch", "Micro Pump: OFF command REJECTED by safety gate");
          }

  - platform: template
    id: pump_bloom_switch
    name: "10_05_Bloom Pump"   # NutrientPumpC → nutrient_C_ml_per_liter (GPIO22)
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("NutrientPumpC", true, 0)) {
            ESP_LOGW("switch", "Bloom Pump: ON command REJECTED by safety gate");
          }
    turn_off_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("NutrientPumpC", false)) {
            ESP_LOGW("switch", "Bloom Pump: OFF command REJECTED by safety gate");
          }

  # === Shelly-Controlled Actuators (Shelly Plus 4PM @ 192.168.0.130) ===
  # AirPump on Socket 0, WastewaterPump on Socket 2
  # Socket 1 and 3 reserved for future expansion

  - platform: template
    id: air_pump_shelly_switch
    name: "10_06_Air Pump (Shelly Socket 0)"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - http_request.get:
          url: "http://192.168.0.130/rpc/Switch.Set?id=0&on=true"
      - lambda: |-
          ESP_LOGI("switch", "Air Pump (Shelly Socket 0): Manual ON - HTTP sent (no safety validation)");
    turn_off_action:
      - http_request.get:
          url: "http://192.168.0.130/rpc/Switch.Set?id=0&on=false"
      - lambda: |-
          ESP_LOGI("switch", "Air Pump (Shelly Socket 0): Manual OFF - HTTP sent");

  - platform: template
    id: wastewater_pump_shelly_switch
    name: "10_07_Wastewater Pump (Shelly Socket 2)"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - http_request.get:
          url: "http://192.168.0.130/rpc/Switch.Set?id=2&on=true"
      - lambda: |-
          ESP_LOGI("switch", "Wastewater Pump (Shelly Socket 2): Manual ON - HTTP sent (no safety validation)");
    turn_off_action:
      - http_request.get:
          url: "http://192.168.0.130/rpc/Switch.Set?id=2&on=false"
      - lambda: |-
          ESP_LOGI("switch", "Wastewater Pump (Shelly Socket 2): Manual OFF - HTTP sent");

  - platform: template
    id: grow_light_shelly_switch
    name: "10_08_Grow Light (Shelly Socket 3)"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - http_request.get:
          url: "http://192.168.0.130/rpc/Switch.Set?id=3&on=true"
      - lambda: |-
          ESP_LOGI("switch", "Grow Light (Shelly Socket 3): Manual ON - HTTP sent");
    turn_off_action:
      - http_request.get:
          url: "http://192.168.0.130/rpc/Switch.Set?id=3&on=false"
      - lambda: |-
          ESP_LOGI("switch", "Grow Light (Shelly Socket 3): Manual OFF - HTTP sent");

  # === pH Sensor Control ===
  - platform: template
    name: "07_03_Enable Continuous pH Reading"
    id: continuous_ph_reading_switch
    optimistic: true
    turn_on_action:
      # Enable continuous reading mode (C,1)
      # Sensor outputs pH every second automatically
      # WARNING: This interferes with normal polling operation
      then:
        - lambda: |-
            ESP_LOGI("switch", "Enabling continuous pH reading mode");
            id(ezo_ph_uart_component)->enable_continuous_reading();
    turn_off_action:
      # Disable continuous reading mode (C,0)
      # Returns sensor to command mode (default)
      then:
        - lambda: |-
            ESP_LOGI("switch", "Disabling continuous pH reading mode");
            id(ezo_ph_uart_component)->disable_continuous_reading();

  # === Night Mode Configuration ===

  - platform: template
    name: "01_01_Night Mode Enabled"
    id: night_mode_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:weather-night"
    turn_on_action:
      - lambda: |-
          ESP_LOGI("switch", "Night Mode ENABLED - no pH correction, feeding, or filling during night hours");
          id(unified_controller)->setNightModeConfig(true, id(night_start_hour).state, id(night_end_hour).state);
    turn_off_action:
      - lambda: |-
          ESP_LOGI("switch", "Night Mode DISABLED");
          id(unified_controller)->setNightModeConfig(false, id(night_start_hour).state, id(night_end_hour).state);

  # === 11 - Verbose Logging Toggles ===
  # These switches control debug log output for specific components
  # Turning ON enables DEBUG level (verbose), turning OFF sets to INFO level (quiet)
  # Helps reduce log clutter during calibration and normal operation

  - platform: template
    name: "11_00_Verbose: ALL (Master Toggle)"
    id: verbose_all
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:bug"
    turn_on_action:
      - logger.log:
          format: "Enabling ALL verbose logging"
          level: WARN
      - switch.turn_on: verbose_sensor
      - switch.turn_on: verbose_text_sensor
      - switch.turn_on: verbose_ezo_ph
      - switch.turn_on: verbose_sensor_filter
      - switch.turn_on: verbose_dallas
      - switch.turn_on: verbose_controller
      - switch.turn_on: verbose_gpio_status
      - switch.turn_on: verbose_component
      - switch.turn_on: verbose_esp_idf
      - switch.turn_on: verbose_time
    turn_off_action:
      - logger.log:
          format: "Disabling ALL verbose logging"
          level: WARN
      - switch.turn_off: verbose_sensor
      - switch.turn_off: verbose_text_sensor
      - switch.turn_off: verbose_ezo_ph
      - switch.turn_off: verbose_sensor_filter
      - switch.turn_off: verbose_dallas
      - switch.turn_off: verbose_controller
      - switch.turn_off: verbose_gpio_status
      - switch.turn_off: verbose_component
      - switch.turn_off: verbose_esp_idf
      - switch.turn_off: verbose_time

  - platform: template
    name: "11_01_Verbose: Sensor State Updates"
    id: verbose_sensor
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:bug-outline"
    turn_on_action:
      - logger.log:
          format: "Enabling verbose logging for: sensor"
          level: INFO
      - lambda: |-
          esp_log_level_set("sensor", ESP_LOG_DEBUG);
    turn_off_action:
      - logger.log:
          format: "Disabling verbose logging for: sensor"
          level: INFO
      - lambda: |-
          esp_log_level_set("sensor", ESP_LOG_INFO);

  - platform: template
    name: "11_02_Verbose: Text Sensor Updates"
    id: verbose_text_sensor
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:bug-outline"
    turn_on_action:
      - logger.log:
          format: "Enabling verbose logging for: text_sensor"
          level: INFO
      - lambda: |-
          esp_log_level_set("text_sensor", ESP_LOG_DEBUG);
    turn_off_action:
      - logger.log:
          format: "Disabling verbose logging for: text_sensor"
          level: INFO
      - lambda: |-
          esp_log_level_set("text_sensor", ESP_LOG_INFO);

  - platform: template
    name: "11_03_Verbose: EZO pH UART"
    id: verbose_ezo_ph
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:bug-outline"
    turn_on_action:
      - logger.log:
          format: "Enabling verbose logging for: ezo_ph_uart"
          level: INFO
      - lambda: |-
          esp_log_level_set("ezo_ph_uart", ESP_LOG_DEBUG);
    turn_off_action:
      - logger.log:
          format: "Disabling verbose logging for: ezo_ph_uart"
          level: INFO
      - lambda: |-
          esp_log_level_set("ezo_ph_uart", ESP_LOG_INFO);

  - platform: template
    name: "11_04_Verbose: Sensor Filter"
    id: verbose_sensor_filter
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:bug-outline"
    turn_on_action:
      - logger.log:
          format: "Enabling verbose logging for: sensor_filter"
          level: INFO
      - lambda: |-
          esp_log_level_set("sensor_filter", ESP_LOG_DEBUG);
    turn_off_action:
      - logger.log:
          format: "Disabling verbose logging for: sensor_filter"
          level: INFO
      - lambda: |-
          esp_log_level_set("sensor_filter", ESP_LOG_INFO);

  - platform: template
    name: "11_05_Verbose: Dallas Temp Sensor"
    id: verbose_dallas
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:bug-outline"
    turn_on_action:
