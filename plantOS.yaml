  # === 15 - Calendar Day Control ===
  - platform: template
    name: "06_09_Calendar Day +1"
    on_press:
      # Advance calendar to next day
      # Useful for manually advancing grow cycle or skipping days
      then:
        - lambda: |-
            ESP_LOGI("button", "Calendar Day +1 button pressed");
            if (id(plant_calendar)->advance_day()) {
              ESP_LOGI("button", "Advanced to day %d", id(plant_calendar)->get_current_day());
              // Update text sensor immediately
              id(current_grow_day_text).update();
            } else {
              ESP_LOGE("button", "Failed to advance calendar day");
            }

  - platform: template
    name: "06_10_Calendar Day -1"
    on_press:
      # Go back to previous calendar day
      # Useful for extending a growth phase or correcting accidental advances
      then:
        - lambda: |-
            ESP_LOGI("button", "Calendar Day -1 button pressed");
            if (id(plant_calendar)->go_back_day()) {
              ESP_LOGI("button", "Went back to day %d", id(plant_calendar)->get_current_day());
              // Update text sensor immediately
              id(current_grow_day_text).update();
            } else {
              ESP_LOGE("button", "Failed to go back calendar day");
            }

################################################################################
# PlantOS HAL (Hardware Abstraction Layer) - Layer 3
#
# Provides platform-agnostic hardware interface for the unified Controller.
# Phase 2 implementation - hardware actuators connected.
################################################################################
plantos_hal:
  id: hal
  system_led: system_led
  ph_sensor: ph_sensor_real  # Real EZO pH UART sensor with filtering
  ph_sensor_component: ezo_ph_uart_component  # EZO pH UART component for calibration and direct readings
  temperature_sensor: water_temperature  # DS18B20 temperature sensor on GPIO23
  water_level_high_sensor: water_level_high_sensor  # XKC-Y23-V capacitive sensor on GPIO10
  water_level_low_sensor: water_level_low_sensor  # XKC-Y23-V capacitive sensor on GPIO11 (auto-feed trigger level)
  water_level_empty_sensor: water_level_empty_sensor  # XKC-Y23-V capacitive sensor on GPIO16 (minimum safe level)
  time_source: sntp_time  # Time source for clock-based pH scheduling (time_dummy for testing, can be NTP/RTC)

  # Actuator GPIO Outputs (Phase 2: Hardware Control - 5 GPIO actuators)
  # NOTE: Using outputs instead of switches to avoid circular dependency
  # Pump Mapping: Grow=NutrientPumpA, Micro=NutrientPumpB, Bloom=NutrientPumpC
  mag_valve_output: mag_valve_output        # GPIO18 - Magnetic valve (fresh water inlet)
  pump_ph_output: pump_ph_output            # GPIO19 - pH pump (acid dosing)
  pump_grow_output: pump_grow_output        # GPIO20 - Grow pump (NutrientPumpA → nutrient_A_ml_per_liter)
  pump_micro_output: pump_micro_output      # GPIO21 - Micro pump (NutrientPumpB → nutrient_B_ml_per_liter)
  pump_bloom_output: pump_bloom_output      # GPIO22 - Bloom pump (NutrientPumpC → nutrient_C_ml_per_liter)

  # Shelly HTTP Switches (MVP: AirPump and WastewaterPump via Shelly Plus 4PM @ 192.168.0.130)
  air_pump_switch: air_pump_shelly_switch           # Shelly Socket 0 - Air pump for pH mixing
  wastewater_pump_switch: wastewater_pump_shelly_switch  # Shelly Socket 2 - Tank drainage
  http_request_id: http_client                      # HTTP client for direct Shelly control

  # Tank Volume Configuration (for mL/L dosing calculations)
  # Tank Volume Delta: Measured volume between LOW and HIGH water level sensors
  # Used for normal daily feeding operations (auto-feed fills from LOW to HIGH)
  tank_volume_delta_liters: 1.7     # Volume from LOW to HIGH sensors (default: 10.0L)

  # Total Tank Volume: Measured volume from EMPTY to HIGH water level sensors
  # Used for complete reservoir change operations (drains to EMPTY, refills to HIGH)
  total_tank_volume_liters: 2.0     # Volume from EMPTY to HIGH sensors (default: 10.0L)

  # Magnetic Valve Flow Rate (for automated water addition)
  # IMPORTANT: Calibrate using 10s test button (even though valve is ON/OFF only)
  mag_valve_flow_rate_ml_s: 50.0     # Magnetic valve: mL/second when OPEN (default: 50.0, approx 3L/min)

  # Pump Calibration Configuration (flow rates and PWM intensities)
  # IMPORTANT: Update these values after calibration using 10s test buttons
  # Formula: flow_rate_ml_s = (measured_mL) / 10
  # Pump Mapping: Grow=NutrientPumpA, Micro=NutrientPumpB, Bloom=NutrientPumpC
  pump_ph_flow_rate_ml_s: 0.48        # pH pump: mL/second @ configured PWM (default: 1.0 CALIBRATED: 4.8mL/10s @ 100%)
  pump_ph_pwm_intensity: 100%        # pH pump: PWM intensity (0-100%, default: 100% CALIBRATED: 100%@5V)
  pump_grow_flow_rate_ml_s: 0.45     # Grow pump (NutrientPumpA): mL/second @ configured PWM (CALIBRATED: 4.0mL/10s @ 60%)
  pump_grow_pwm_intensity: 60%       # Grow pump (NutrientPumpA): PWM intensity (0-100%, CALIBRATED: 60%@5V)
  pump_micro_flow_rate_ml_s: 1.0     # Micro pump (NutrientPumpB): mL/second @ configured PWM (default: 1.0)
  pump_micro_pwm_intensity: 100%     # Micro pump (NutrientPumpB): PWM intensity (0-100%, default: 100%)
  pump_bloom_flow_rate_ml_s: 1.0     # Bloom pump (NutrientPumpC): mL/second @ configured PWM (default: 1.0)
  pump_bloom_pwm_intensity: 100%     # Bloom pump (NutrientPumpC): PWM intensity (0-100%, default: 100%)

  # pH Reading Configuration
  ph_reading_interval: 2h     # How often to check pH (default: 2 hours)
  ph_min: 5.5                  # Lower pH threshold (default: 5.5)
  ph_max: 6.2                  # Upper pH threshold (default: 6.2)
                               # If pH is outside this range, controller will
                               # transition to PH_PROCESSING state and decide
                               # whether to start pH correction

################################################################################
# PlantOS Unified Controller (Layer 1) - Phase 8
#
# Unified controller managing:
# - System FSM with 12 states
# - LED behaviors via LedBehaviorSystem
# - HAL integration for sensors/LED
# - SafetyGate integration for actuators
# - StatusLogger (owned internally, not injected)
# - PSM integration for crash recovery
#
# Architecture: Controller → SafetyGate → HAL → Hardware
################################################################################
plantos_controller:
  id: unified_controller
  hal: hal                       # Hardware abstraction layer
  safety_gate: actuator_safety   # Actuator control with safety enforcement
  persistence: psm               # Persistent state manager for crash recovery
  ph_sensor: ezo_ph_uart_component  # pH sensor for calibration control
  calendar: plant_calendar       # Calendar manager for grow schedule and nutrient dosing
  time_source: sntp_time         # NTP time source for automatic day calculation

  # Grow Cycle Configuration
  # grow_start_date: Date when grow cycle day 1 started (YYYY-MM-DD format)
  # Controller calculates current day by comparing NTP time to this start date
  # Example: "2025-12-30" means Dec 30, 2025 is day 1 of the 120-day cycle
  # If not set, falls back to calendar manager's manual day counter (NVS-persisted)
  grow_start_date: "2025-12-30"

  # Night Mode Configuration
  night_mode_enabled: false     # Enable/disable night mode (default: false, use switch in web UI)
  night_mode_start_hour: 22     # Hour when night mode starts (0-23, default: 22 = 10 PM)
  night_mode_end_hour: 8        # Hour when night mode ends (0-23, default: 8 = 8 AM)
                                # During night mode: no pH correction, feeding, or water filling

  # Status Logger Configuration
  enable_status_reports: false  # Enable/disable periodic status reports (default: false, use switch 11_10)
  status_report_interval: 60s   # How often to print status reports (default: 30s)
  verbose_mode: false           # Enable instant verbose logging of all events (default: false)
                                # Verbose mode logs state changes, sensor readings, and actuator
                                # commands in real-time without waiting for periodic reports.
                                # Note: LED changes are automatically filtered out.
  enable_420_mode: true         # Enable 420 easter egg at 4:20 AM/PM (default: true)
                                # When enabled, displays ASCII art in status logs at 4:20

  # Enhanced Error Handling Configuration
  enhanced_error_handling: true # Enable enhanced error handling with retry logic (default: false)
                                # When enabled: duration adaptation, sensor retry with exponential
                                # backoff, comprehensive 4-part error messages, and RESOLVED state
                                # tracking. Disable for backward-compatible legacy behavior.

# Actuator Safety Gate (Layer 2) - Debouncing, Duration Limits, Soft-Start/Stop
# See components/actuator_safety_gate/README.md for complete documentation.
actuator_safety_gate:
  id: actuator_safety
  hal: hal  # Phase 2: Inject HAL dependency for hardware control

################################################################################
# EZO pH Sensor Component via UART (Atlas Scientific)
#
# Production pH sensor using UART communication with EZO Carrier pH Click board.
# This is the native communication mode for the MikroElektronika EZO carrier board.
#
# Hardware Requirements:
# - MikroElektronika EZO Carrier pH Click board
# - Atlas Scientific EZO pH Circuit (installed on carrier)
# - pH probe (included with EZO kit)
# - UART connection to ESP32-C6 (TX=GPIO4, RX=GPIO5)
# - 3.3V or 5V power supply (carrier has voltage regulator)
#
# Calibration:
# - Use ESPHome API services to calibrate (see api section)
# - Mid-point: pH 7.00 buffer solution (required first)
# - Low-point: pH 4.00 buffer solution (optional)
# - High-point: pH 10.00 buffer solution (optional)
#
# Temperature Compensation:
# - Configure temperature_compensation parameter below
# - Links to a temperature sensor for improved accuracy
# - Improves accuracy from ±0.1 pH to ±0.02 pH
#
# UART Protocol Details:
# - Baud Rate: 9600 (EZO UART mode)
# - ASCII text commands terminated with \r (carriage return)
# - 300ms response delay required after each command
################################################################################
ezo_ph_uart:
  id: ezo_ph_uart_component
  uart_id: uart_bus
  update_interval: 5s  # Read pH every 5 seconds (faster readings for better calibration stability detection)
  verbose: false  # Disable verbose UART logging by default (enabled dynamically during calibration)
  # pH sensor configuration
  ph:
    name: "00_05_Nutrient Solution pH"
    id: ph_sensor_real
    accuracy_decimals: 2
    filters:
      # Sliding window moving average smooths out minor fluctuations
      - sliding_window_moving_average:
          window_size: 5     # Average last 5 readings
          send_every: 1      # Publish every reading (after averaging)
      # Lambda filter for range validation and outlier rejection
      - lambda: |-
          if (x < 0.0 || x > 14.0) {
            ESP_LOGW("ezo_ph_uart", "pH value out of typical range: %.2f", x);
            return {};  // Reject outliers
          }
          return x;

  # Optional: Temperature compensation for improved accuracy
  # Uncomment and link to your temperature sensor when available
  # temperature_compensation: water_temp_sensor

################################################################################
# Persistent State Manager - NVS-Based Critical Event Logging
#
# Manages critical event persistence across power cycles and crashes.
# Essential for operations that could cause damage if interrupted:
# - Chemical dosing (acid/base pumps)
# - Watering/valve operations
# - Calibration sequences
# - Any long-running critical process
#
# Features:
# - NVS (Non-Volatile Storage) persistence survives power loss
# - Time-based event age validation (requires NTP sync)
# - Recovery detection on boot
# - Atomic save/load operations
#
# Usage Example:
#   // Before starting critical operation
#   id(psm).logEvent("DOSING_ACID", 0);  // Status 0 = STARTED
#   turnOnAcidPump();
#
#   // After completing operation
#   turnOffAcidPump();
#   id(psm).clearEvent();  // Clear - operation completed
#
#   // On boot - check for recovery
#   if (id(psm).wasInterrupted(60)) {  // Within last 60 seconds
#       // Take recovery action (turn off pumps, etc.)
#   }
################################################################################
persistent_state_manager:
  id: psm

################################################################################
# WDT Manager - Hardware Watchdog Timer Management
#
# Manages the ESP32 hardware watchdog timer (WDT) to detect and recover from
# system hangs or crashes. The WDT must be regularly "fed" to indicate the
# system is healthy. If feeding stops, the WDT automatically resets the device.
#
# Features:
# - Hardware WDT initialization with 10-second timeout
# - Regular WDT feeding every 500ms during normal operation
# - Test mode: Simulates crash after 20 seconds to verify automatic reset
# - Non-blocking operation using millis() timing
#
# Configuration:
# - timeout: WDT timeout period (10 seconds)
# - feed_interval: How often to feed WDT (500ms)
# - test_mode: Enable crash simulation (true for testing)
# - crash_delay: Time before simulated crash (20 seconds)
#
# Expected Behavior (Test Mode):
# 1. Boot: "WDT initialized successfully"
# 2. 0-20s: Regular "WDT fed" messages every 500ms
# 3. 20s: "SIMULATED CRASH - Stopping WDT feeding"
# 4. ~30s: WDT timeout triggers automatic reboot
# 5. Device reboots and cycle repeats
#
# For Production: Set test_mode: false to disable crash simulation
################################################################################
wdt_manager:
  id: my_wdt
  timeout: 20s           # WDT timeout: 20 seconds (increased for 15s HTTP timeout)
  feed_interval: 500ms   # Feed WDT every 500 milliseconds
  test_mode: false        # Enable crash simulation for testing
  crash_delay: 20s       # Simulate crash after 20 seconds

################################################################################
# CalendarManager - Daily Schedule Management for 120-Day Grow Cycle
#
# Manages target pH values and nutrient dosing durations for each day.
# Current day is persisted to NVS and survives power cycles.
################################################################################
calendar_manager:
  id: plant_calendar

  # Safe mode: Disable automated time-based routines (manual control still works)
  safe_mode: false

  # Verbose mode: Enable detailed logging of all operations
  verbose: false

  # Status log interval: How often to report current day and schedule
