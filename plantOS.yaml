################################################################################
# GPIO Status Logger (DEBUG Mode)
#
# Periodically logs GPIO pin status for all used pins in the system.
# Shows InputEn, OutputEn, and current level for each GPIO.
# Only active in DEBUG logger mode.
################################################################################
interval:
  - interval: 30s
    then:
      - lambda: |-
          // GPIO Status Logger - Simple level reading
          // Note: ESP-IDF doesn't provide easy public API for reading input/output enable
          // so we only log the current GPIO level (0=LOW, 1=HIGH)

          auto log_gpio = [](int pin, const char* name) {
            int level = gpio_get_level((gpio_num_t)pin);
            ESP_LOGD("gpio_status", "GPIO[%d] %-20s| Level: %d", pin, name, level);
          };

          ESP_LOGD("gpio_status", "");
          ESP_LOGD("gpio_status", "=== GPIO Status Report ===");

          // Sensors
          log_gpio(0, "Light Sensor (ADC)");
          log_gpio(4, "EZO pH UART TX");
          log_gpio(5, "EZO pH UART RX");

          // I2C Bus
          log_gpio(6, "I2C SDA");
          log_gpio(7, "I2C SCL");

          // System LED
          log_gpio(8, "System LED (WS2812)");

          // Water Level Sensors (future - XKC-Y23-V)
          log_gpio(10, "Water Level HIGH");
          log_gpio(11, "Water Level LOW");

          // GPIO16 available for future use
          // log_gpio(16, "Available");

          // Temperature Sensor (1-Wire)
          log_gpio(23, "Water Temp (DS18B20)");

          // Actuators (Active HIGH outputs)
          log_gpio(18, "Water Valve (Mag)");
          log_gpio(19, "Acid Pump (pH)");
          log_gpio(20, "Nutrient Pump (Grow)");
          log_gpio(21, "Nutrient Pump (Micro)");
          log_gpio(22, "Nutrient Pump (Bloom)");
          // GPIO23 is now DS18B20 (1-Wire), not a GPIO output
          // log_gpio(23, "Wastewater Pump");  // Removed - not MVP

          ESP_LOGD("gpio_status", "=========================");
          ESP_LOGD("gpio_status", "");

  # Shelly Health Check Interval - Ping Shelly every 30 seconds
  # This script sends an HTTP ping to the Shelly Plus 4PM and updates the HAL health status
  # Uses HAL's HTTP serialization to prevent socket exhaustion
  # Shelly health check - ping the device every 30 seconds
  - interval: 30s
    then:
      - lambda: |-
          // HAL's pingShellyDevice handles everything:
          // - Checks if HTTP request can be sent
          // - Sends synchronous ping with proper response handling
          // - Updates health status internally
          id(hal).pingShellyDevice(nullptr);

  # Shelly State Polling Interval - Poll switch states every 5 seconds
  # This ensures Web UI toggles show actual Shelly state (max 5s delay)
  # and ASG debouncing uses actual device state, not just requested state
  - interval: 5s
    then:
      - http_request.get:
          url: "http://192.168.0.130/script/1/api?action=states"
          capture_response: true
          headers:
            Connection: close
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    // Parse JSON response: {"switches": {"0": true, "1": false, ...}, ...}
                    // 'body' is automatically available as std::string when capture_response: true

                    // Helper to find boolean value for a switch
                    auto findSwitchState = [&body](const char* key) -> int {
                      std::string search = std::string("\"") + key + "\":";
                      size_t pos = body.find(search);
                      if (pos == std::string::npos) return -1;  // Not found
                      pos += search.length();
                      // Skip whitespace
                      while (pos < body.length() && (body[pos] == ' ' || body[pos] == '\t')) pos++;
                      if (pos >= body.length()) return -1;
                      if (body[pos] == 't') return 1;   // true
                      if (body[pos] == 'f') return 0;   // false
                      return -1;  // Unknown
                    };

                    // Update switch states in HAL and ASG
                    int state0 = findSwitchState("0");
                    int state2 = findSwitchState("2");
                    int state3 = findSwitchState("3");

                    if (state0 >= 0) {
                      bool s0 = (state0 == 1);
                      id(hal).updateShellySwitchState(0, s0);
                      id(actuator_safety).updateActualState("AirPump", s0);
                    }
                    if (state2 >= 0) {
                      bool s2 = (state2 == 1);
                      id(hal).updateShellySwitchState(2, s2);
                      id(actuator_safety).updateActualState("WastewaterPump", s2);
                    }
                    if (state3 >= 0) {
                      bool s3 = (state3 == 1);
                      id(hal).updateShellySwitchState(3, s3);
                      id(actuator_safety).updateActualState("GrowLight", s3);
                    }

                    // Also update Shelly health since we got a successful response
                    id(hal).updateShellyHealth(true, 0);

                    ESP_LOGD("shelly_poll", "States: AirPump=%d, Wastewater=%d, GrowLight=%d",
                             state0, state2, state3);
                  } else {
                    ESP_LOGW("shelly_poll", "State poll failed (status %d)", response->status_code);
                  }
          on_error:
            then:
              - lambda: |-
                  ESP_LOGW("shelly_poll", "State poll HTTP error");

################################################################################
# Scripts - Reusable Automation Sequences
#
# Scripts are reusable sequences of actions that can be called from anywhere.
################################################################################
script:
  # Connectivity Check Timeout Handler
  # Called when HTTP request times out (no response received)
  # Waits for the HTTP request timeout, then checks if we got a response
  - id: connectivity_check_timeout
    mode: single  # Only one instance can run at a time
    then:
      # Wait for HTTP request to timeout (5s configured in http_request component)
      - delay: 6s

      # If we reach here, the HTTP request timed out without calling on_response
      - logger.log:
          format: "✗ Online connectivity check TIMEOUT - No response from www.google.com"
          level: WARN
          tag: wifi
      - logger.log:
          format: "Possible mesh network issue - Reconnecting WiFi..."
          level: WARN
          tag: wifi
      - wifi.disable:
      - delay: 2s
      - logger.log:
          format: "Reconnecting WiFi..."
          level: INFO
          tag: wifi
      - wifi.enable:

  # WiFi Reconnect Script
  # Reconnects WiFi when online check fails
  - id: wifi_reconnect
    mode: single
    then:
      - wifi.disable:
      - delay: 2s
      - logger.log:
          format: "Reconnecting WiFi..."
          level: INFO
          tag: wifi
      - wifi.enable:

