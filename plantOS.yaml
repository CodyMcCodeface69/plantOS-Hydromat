################################################################################
switch:
  # === 01 - Air Pump Control ===
  - platform: template
    id: air_pump_cycling_switch
    name: "01_04_Air Pump Cycling"
    restore_mode: RESTORE_DEFAULT_OFF  # Default to Normal mode (24/7 ON)
    optimistic: true
    icon: "mdi:air-purifier"
    turn_on_action:
      # Enable intermittent cycling for air pump
      # Uses periods configured via number sliders (01_05 and 01_06)
      # Starts with ON cycle immediately
      - lambda: |-
          uint32_t on_period = (uint32_t)id(air_pump_on_period).state;
          uint32_t off_period = (uint32_t)id(air_pump_off_period).state;

          ESP_LOGI("switch", "=== Air Pump Cycling ENABLED ===");
          ESP_LOGI("switch", "ON period: %u seconds", on_period);
          ESP_LOGI("switch", "OFF period: %u seconds", off_period);

          id(actuator_safety)->setCyclingPeriods("AirPump", on_period, off_period);
          id(actuator_safety)->enableCycling("AirPump", true);

          ESP_LOGI("switch", "Air pump will cycle: %us ON, %us OFF", on_period, off_period);
          ESP_LOGI("switch", "Starting with ON cycle");
          ESP_LOGI("switch", "================================");
    turn_off_action:
      # Disable intermittent cycling and enable Normal mode (24/7 ON)
      - lambda: |-
          ESP_LOGI("switch", "=== Air Pump: NORMAL MODE (24/7 ON) ===");
          id(actuator_safety)->enableCycling("AirPump", false);
          ESP_LOGI("switch", "Cycling disabled - air pump will run continuously");
          ESP_LOGI("switch", "Controller will turn ON pump within 30 seconds");
          ESP_LOGI("switch", "========================================");

  # === 02 - Safety Gate Control ===
  - platform: template
    id: safety_gate_enabled
    name: "02_01_Enable Actuator Safety Gate"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON  # Safety gate enabled by default
    turn_on_action:
      - lambda: |-
          ESP_LOGI("switch", "Actuator Safety Gate ENABLED");
          id(actuator_safety)->setEnabled(true);
    turn_off_action:
      - lambda: |-
          ESP_LOGW("switch", "Actuator Safety Gate DISABLED - manual control mode");
          id(actuator_safety)->setEnabled(false);

  # === 02 - Automatic Feeding Control ===
  - platform: template
    id: auto_feeding_enabled_switch
    name: "02_02_Auto Feeding Enabled"
    icon: "mdi:robot"
    restore_mode: RESTORE_DEFAULT_ON  # Auto-feeding enabled by default
    optimistic: false  # State determined by lambda return value
    turn_on_action:
      - lambda: |-
          ESP_LOGI("switch", "====================================");
          ESP_LOGI("switch", "AUTO-FEEDING ENABLED");
          ESP_LOGI("switch", "====================================");
          ESP_LOGI("switch", "System will automatically trigger feeding when:");
          ESP_LOGI("switch", "  1. Water level reaches LOW (HIGH=OFF, LOW=OFF, EMPTY=ON)");
          ESP_LOGI("switch", "  2. Controller in IDLE state");
          ESP_LOGI("switch", "  3. NOT in NIGHT/SHUTDOWN/PAUSE/ERROR mode");
          ESP_LOGI("switch", "  4. Feeding not already triggered today");
          ESP_LOGI("switch", "====================================");

          // Save state to NVS
          id(psm).saveState("AutoFeedEnable", true);

          // Update controller state
          id(unified_controller).setAutoFeedingEnabled(true);
    turn_off_action:
      - lambda: |-
          ESP_LOGW("switch", "====================================");
          ESP_LOGW("switch", "AUTO-FEEDING DISABLED");
          ESP_LOGW("switch", "====================================");
          ESP_LOGW("switch", "Manual feeding only - no automatic triggers");
          ESP_LOGW("switch", "====================================");

          // Save state to NVS
          id(psm).saveState("AutoFeedEnable", false);

          // Update controller state
          id(unified_controller).setAutoFeedingEnabled(false);
    lambda: |-
      // Return cached value from controller (loaded from NVS at setup)
      // DO NOT call loadState() here - it allocates memory on each call!
      return id(unified_controller).isAutoFeedingEnabled();

  # === 02 - Automatic Weekly Reservoir Change Control ===
  - platform: template
    id: auto_reservoir_change_enabled_switch
    name: "02_03_Auto Reservoir Change Enabled"
    icon: "mdi:calendar-sync"
    restore_mode: RESTORE_DEFAULT_OFF  # Disabled by default (manual control preferred)
    optimistic: false  # State determined by lambda return value
    turn_on_action:
      - lambda: |-
          ESP_LOGI("switch", "====================================");
          ESP_LOGI("switch", "AUTO RESERVOIR CHANGE ENABLED");
          ESP_LOGI("switch", "====================================");
          ESP_LOGI("switch", "System will automatically trigger reservoir change when:");
          ESP_LOGI("switch", "  1. Current day is the configured day of week");
          ESP_LOGI("switch", "  2. Controller in IDLE state");
          ESP_LOGI("switch", "  3. NOT in NIGHT/SHUTDOWN/PAUSE/ERROR mode");
          ESP_LOGI("switch", "  4. Reservoir change not already triggered this week");
          ESP_LOGI("switch", "====================================");

          // Save state to NVS
          id(psm).saveState("AutoResEnable", true);

          // Update controller state
          id(unified_controller).setAutoReservoirChangeEnabled(true);
    turn_off_action:
      - lambda: |-
          ESP_LOGW("switch", "====================================");
          ESP_LOGW("switch", "AUTO RESERVOIR CHANGE DISABLED");
          ESP_LOGW("switch", "====================================");
          ESP_LOGW("switch", "Manual reservoir change only - no automatic triggers");
          ESP_LOGW("switch", "====================================");

          // Save state to NVS
          id(psm).saveState("AutoResEnable", false);

          // Update controller state
          id(unified_controller).setAutoReservoirChangeEnabled(false);
    lambda: |-
      // Return cached value from controller (loaded from NVS at setup)
      return id(unified_controller).isAutoReservoirChangeEnabled();

  # === 10 - Actuator Control (Manual Toggle Switches via Safety Gate) ===
  # These switches toggle actuators through the safety gate for monitored control
  # Safety gate will auto-shutoff if max duration exceeded
  # Note: optimistic=true, switches show intended state (not actual hardware state)
  - platform: template
    id: mag_valve_switch
    name: "10_01_Magnetic Valve"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("WaterValve", true, 0)) {
            ESP_LOGW("switch", "Magnetic Valve: ON command REJECTED by safety gate");
          }
    turn_off_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("WaterValve", false)) {
            ESP_LOGW("switch", "Magnetic Valve: OFF command REJECTED by safety gate");
          }

  - platform: template
    id: pump_ph_switch
    name: "10_02_pH Pump"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          if (!id(actuator_safety)->executeCommand("AcidPump", true, 0)) {
            ESP_LOGW("switch", "pH Pump: ON command REJECTED by safety gate");
          }
    turn_off_action:
