            float target_ml = 20.0f;
            float duration_s = id(hal)->pumpflow("AcidPump", target_ml);

            ESP_LOGI("button", "=== pH Pump 2cl Test ===");
            ESP_LOGI("button", "Target: %.1f mL (2cl)", target_ml);
            ESP_LOGI("button", "Calculated duration: %.2f seconds", duration_s);
            ESP_LOGI("button", "Using configured PWM and flow rate from HAL");

            // Turn on pump using configured PWM intensity
            id(hal)->setPump("AcidPump", true);

        # Wait for calculated duration (convert to milliseconds)
        - delay: !lambda "return (uint32_t)(id(hal)->pumpflow(\"AcidPump\", 20.0f) * 1000);"

        - lambda: |-
            // Turn off pump
            id(hal)->setPump("AcidPump", false);
            ESP_LOGI("button", "pH Pump OFF - 2cl test complete");
            ESP_LOGI("button", "Please verify 20mL was dispensed");
            ESP_LOGI("button", "==========================");

  - platform: template
    name: "13_03_Test Micro Pump (2cl = 20mL)"
    on_press:
      # Test precise volume output: 2cl (20mL) from Micro Pump
      # Uses HAL pumpflow() to convert mL to seconds based on calibration
      then:
        - lambda: |-
            // Use HAL pumpflow to calculate duration for 20mL
            float target_ml = 20.0f;
            float duration_s = id(hal)->pumpflow("NutrientPumpB", target_ml);

            ESP_LOGI("button", "=== Micro Pump 2cl Test ===");
            ESP_LOGI("button", "Target: %.1f mL (2cl)", target_ml);
            ESP_LOGI("button", "Calculated duration: %.2f seconds", duration_s);
            ESP_LOGI("button", "Using configured PWM and flow rate from HAL");

            // Turn on pump using configured PWM intensity
            id(hal)->setPump("NutrientPumpB", true);

        # Wait for calculated duration (convert to milliseconds)
        - delay: !lambda "return (uint32_t)(id(hal)->pumpflow(\"NutrientPumpB\", 20.0f) * 1000);"

        - lambda: |-
            // Turn off pump
            id(hal)->setPump("NutrientPumpB", false);
            ESP_LOGI("button", "Micro Pump OFF - 2cl test complete");
            ESP_LOGI("button", "Please verify 20mL was dispensed");
            ESP_LOGI("button", "==========================");

  - platform: template
    name: "13_04_Test Bloom Pump (2cl = 20mL)"
    on_press:
      # Test precise volume output: 2cl (20mL) from Bloom Pump
      # Uses HAL pumpflow() to convert mL to seconds based on calibration
      then:
        - lambda: |-
            // Use HAL pumpflow to calculate duration for 20mL
            float target_ml = 20.0f;
            float duration_s = id(hal)->pumpflow("NutrientPumpC", target_ml);

            ESP_LOGI("button", "=== Bloom Pump 2cl Test ===");
            ESP_LOGI("button", "Target: %.1f mL (2cl)", target_ml);
            ESP_LOGI("button", "Calculated duration: %.2f seconds", duration_s);
            ESP_LOGI("button", "Using configured PWM and flow rate from HAL");

            // Turn on pump using configured PWM intensity
            id(hal)->setPump("NutrientPumpC", true);

        # Wait for calculated duration (convert to milliseconds)
        - delay: !lambda "return (uint32_t)(id(hal)->pumpflow(\"NutrientPumpC\", 20.0f) * 1000);"

        - lambda: |-
            // Turn off pump
            id(hal)->setPump("NutrientPumpC", false);
            ESP_LOGI("button", "Bloom Pump OFF - 2cl test complete");
            ESP_LOGI("button", "Please verify 20mL was dispensed");
            ESP_LOGI("button", "==========================");

  - platform: template
    name: "12_06_Test Air Pump (Shelly Socket 0)"
    on_press:
      # Turn ON air pump via Shelly for 5 seconds
      # Tests HTTP communication and Shelly socket control
      then:
        - lambda: |-
            ESP_LOGI("button", "=== Air Pump Test (Shelly Socket 0) ===");
            ESP_LOGI("button", "Turning ON air pump for 5 seconds...");
        - switch.turn_on: air_pump_shelly_switch
        - delay: 5s
        - switch.turn_off: air_pump_shelly_switch
        - lambda: |-
            ESP_LOGI("button", "Air Pump OFF - 5s test complete");
            ESP_LOGI("button", "========================================");

  - platform: template
    name: "12_07_Test Wastewater Pump (Shelly Socket 2)"
    on_press:
      # Turn ON wastewater pump via Shelly for 5 seconds
      # Tests HTTP communication and Shelly socket control
      then:
