################################################################################
# PlantOS Hardware Configuration
#
# This file defines the complete hardware setup and component interconnections
# for the ESP32-C6 based plant monitoring system.
################################################################################

esphome:
  name: plantos

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    # ESP-IDF is chosen over Arduino for:
    # - Better RISC-V support on ESP32-C6 (newer chip architecture)
    # - More direct hardware access and lower-level control
    # - Better performance for real-time LED control (RMT peripheral)
    # - Official Espressif support and documentation
    type: esp-idf
    version: recommended

logger:
  # DEBUG level enables detailed component logging for development
  # This helps diagnose FSM state transitions and sensor callbacks
  # In production, consider INFO or WARN to reduce log noise
  level: INFO

wifi:
  # Credentials stored in secrets.yaml (gitignored) for security
  # This allows OTA updates and web interface access
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
  # ESPHome OTA allows firmware updates over WiFi without USB cable
  # Critical for deployed devices in hard-to-reach locations (e.g., greenhouse)
  - platform: esphome

web_server:
  # Provides real-time sensor data and component control via browser
  # Accessible at device IP on port 80 (standard HTTP)
  # Useful for debugging and monitoring without serial connection
  port: 80

external_components:
  # Points to local custom components directory
  # ESPHome will compile and link C++ code from here alongside generated code
  - source: components

################################################################################
# Visual Feedback: WS2812 RGB LED
#
# The built-in LED serves as the primary user interface, displaying system
# state via color and animation patterns controlled by the FSM.
################################################################################
light:
  - platform: esp32_rmt_led_strip
    # ESP32-C6-DevKitC-1 has a WS2812 RGB LED hard-wired to GPIO 8
    pin: 8
    num_leds: 1
    rgb_order: RGB
    name: "Built-in LED"
    id: system_led
    chipset: WS2812

    # default_transition_length: 0s disables automatic color smoothing
    # WHY: The FSM controller implements its own timing and animations
    # (breathing effect, blinking). ESPHome's built-in transitions would
    # interfere with precise FSM-driven visual feedback, creating lag or
    # blending between states. Instant transitions give the controller
    # full control over every frame.
    default_transition_length: 0s

################################################################################
# Sensor Input: Dummy Sensor
#
# Development/testing sensor that generates predictable cycling values.
# In production, replace with actual plant sensors (moisture, light, etc.)
################################################################################
sensor:
  - id: sensor_dummy_id
    platform: sensor_dummy
    name: "Dummy Sensor"

    # 1 second polling interval provides frequent updates for responsive
    # controller behavior without overwhelming the ESP32 event loop.
    # Real sensors might use different intervals based on measurement
    # characteristics (e.g., soil moisture changes slowly, could poll every 60s)
    update_interval: 1s

################################################################################
# Text Sensor: Controller State
#
# Publishes the current FSM state to the web UI for monitoring and debugging.
# Shows state names: INIT, CALIBRATION, READY, ERROR
################################################################################
text_sensor:
  - platform: template
    name: "Controller State"
    id: controller_state_text
    # Text sensors don't have numerical state, just publish strings
    # The controller will call publish_state() to update this

################################################################################
# Button: Reset Controller
#
# Provides a manual reset button in the web UI to force the controller back
# to INIT state. Useful for testing, debugging, and manual recalibration.
################################################################################
button:
  - platform: template
    name: "Reset Controller"
    on_press:
      # Lambda action calls the controller's reset_to_init() method
      # This triggers an immediate transition to INIT state
      then:
        - lambda: |-
            id(my_logic_controller)->reset_to_init();

################################################################################
# System Controller: Finite State Machine
#
# The controller is the "brain" of plantOS, implementing a finite state machine
# that processes sensor data and drives LED visual feedback. This architecture
# cleanly separates:
# - Input (sensor_source): What data to monitor
# - Logic (controller FSM): How to interpret data and manage states
# - Output (light_target): How to display system status
#
# Component linking by ID enables:
# 1. Loose coupling: Swap sensors/LEDs without changing controller code
# 2. Type safety: ESPHome validates IDs at compile time
# 3. Testability: Different configurations can reuse the same controller logic
################################################################################
controller:
  id: controller

  # sensor_source: ID reference to any ESPHome sensor component
  # The controller subscribes to this sensor's state changes via callback
  sensor_source: sensor_dummy_id

  # light_target: ID reference to any ESPHome light component
  # The controller calls the light's API to set colors/brightness
  light_target: system_led

  # state_text: ID reference to a text sensor for FSM state publishing
  # The controller will publish state changes (INIT, CALIBRATION, READY, ERROR)
  # to this text sensor for display in the web UI
  state_text: controller_state_text
