# ============================================================
# PlantOS secrets.yaml - EXAMPLE / TEMPLATE
# ============================================================
# Copy this file to secrets.yaml and fill in your values.
# secrets.yaml is gitignored and will NEVER be committed.
#
# Usage: cp secrets.example.yaml secrets.yaml
# ============================================================

# --- WiFi credentials ---
wifi_ssid: "YourWiFiNetworkName"
wifi_password: "YourWiFiPassword"
wifi_bssid: ""              # Optional: MAC address of your AP (e.g. "AA:BB:CC:DD:EE:FF")
                            # Leave empty string or remove line if not needed

# --- Fallback AP (device creates this network if main WiFi fails) ---
# Connect to "PlantOS-Fallback" with this password, then go to http://192.168.4.1
ap_password: "change-me-use-a-strong-password"

# --- Static IP configuration ---
# Set these to match your local network, or remove the manual_ip block
# in plantOS.yaml to use DHCP instead.
device_ip: "192.168.1.100"     # Fixed IP for the ESP32 device
wifi_gateway: "192.168.1.1"    # Your router's IP
wifi_subnet: "255.255.255.0"   # Usually 255.255.255.0
